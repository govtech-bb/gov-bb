name: Deploy Production

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Queue deploys; never cancel one mid-flight. Especially important for prod:
# migrations + ECS rollout + Amplify must not be interrupted by a newer push.
concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ca-central-1
  ECR_REPOSITORY: ssb-api
  ECS_CLUSTER: simple-service-builder-prod
  ECS_SERVICE: ssb-api-prod
  TASK_FAMILY: ssb-api-prod

jobs:
  # Same affected-detection pattern as sandbox, based on the last successful
  # prod deploy (nx-set-shas). Prod runs the API + a single Amplify frontend
  # app; its exact served content isn't verifiable from the repo, so the
  # Amplify gate below is conservative (any frontend change triggers a rebuild).
  setup:
    name: Detect affected targets
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.affected.outputs.api }}
      frontend: ${{ steps.affected.outputs.frontend }}
      migrations: ${{ steps.affected.outputs.migrations }}
      amplify-config: ${{ steps.affected.outputs.amplify-config }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Derive base/head SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: prod
          workflow-id: deploy-prod.yml

      - name: Compute affected deploy targets
        id: affected
        run: |
          AFFECTED=$(pnpm exec nx show projects \
            --affected --base="$NX_BASE" --head="$NX_HEAD" --type app --json 2>/dev/null || echo '[]')
          echo "Affected apps: $AFFECTED"
          has() { echo "$AFFECTED" | jq -e --arg p "$1" 'index($p)' >/dev/null && echo true || echo false; }

          echo "api=$(has api)" >> "$GITHUB_OUTPUT"

          # Prod's single Amplify app (d25vfjylwqa51q) serves at least forms, but
          # what else it builds isn't verifiable from the repo. Conservatively
          # rebuild it whenever ANY frontend app is affected — over-rebuilding is
          # a wasted Amplify run; under-rebuilding ships stale prod.
          if [ "$(has forms)" = "true" ] || [ "$(has landing)" = "true" ] \
             || [ "$(has chat)" = "true" ] || [ "$(has form-builder-app)" = "true" ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          # Migrations: precise path-grep on the unified base; migration:run is
          # idempotent, so gate on real migration file changes only.
          if git diff --name-only "$NX_BASE" "$NX_HEAD" | grep -q '^apps/api/src/database/migrations/'; then
            echo "migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "migrations=false" >> "$GITHUB_OUTPUT"
          fi

          # amplify.yml is a root file nx affected can't attribute to an app;
          # a change to it (or this workflow) must rebuild the Amplify frontend.
          if git diff --name-only "$NX_BASE" "$NX_HEAD" \
              | grep -qE '^(amplify\.yml|\.github/workflows/deploy-prod\.yml)$'; then
            echo "amplify-config=true" >> "$GITHUB_OUTPUT"
          else
            echo "amplify-config=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-api:
    name: Build, Push & Deploy API
    needs: setup
    if: needs.setup.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$REGISTRY/$ECR_REPOSITORY:latest"

          docker build --platform linux/amd64 -f apps/api/Dockerfile -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed $IMAGE_URI"

      - name: Get current task definition
        id: task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --region $AWS_REGION \
            --query taskDefinition \
            --output json > task-def.json
          echo "✅ Task definition fetched"

      - name: Update task definition with new image
        id: new-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: api
          image: ${{ steps.build.outputs.image }}

      - name: Run database migrations
        if: needs.setup.outputs.migrations == 'true'
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$(cat ${{ steps.new-task-def.outputs.task-definition }} | \
              jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')" \
            --region $AWS_REGION \
            --query taskDefinition.taskDefinitionArn \
            --output text)
          echo "Registered migration task def: $TASK_DEF_ARN"

          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0c795b1b09ca96841,subnet-0c9b367709d716236],securityGroups=[sg-0cf036942a6f7affc],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["pnpm","migration:run"]}]}' \
            --region $AWS_REGION \
            --query tasks[0].taskArn \
            --output text)
          echo "Migration task started: $TASK_ARN"

          echo "Waiting for migration task to complete..."
          aws ecs wait tasks-stopped \
            --cluster $ECS_CLUSTER \
            --tasks "$TASK_ARN" \
            --region $AWS_REGION

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks "$TASK_ARN" \
            --region $AWS_REGION \
            --query "tasks[0].containers[?name=='api'].exitCode | [0]" \
            --output text)
          echo "Migration exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration failed with exit code $EXIT_CODE"
            echo "Check logs: aws logs tail /ecs/simple-service-builder-prod-api --follow"
            exit 1
          fi
          echo "✅ Migrations completed successfully"

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.new-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  amplify-forms:
    name: Amplify build (frontend)
    needs: setup
    if: needs.setup.outputs.frontend == 'true' || needs.setup.outputs.amplify-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Trigger and monitor Amplify build
        env:
          AMPLIFY_APP_ID: d25vfjylwqa51q
          AMPLIFY_BRANCH: prod
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text)
          echo "Amplify job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify build succeeded"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify build $STATUS"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify build did not finish within 15 minutes"
          exit 1

  summary:
    name: Deployment summary
    needs: [setup, deploy-api, amplify-forms]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          gate() { [ "$1" = "true" ] && echo "deployed" || echo "skipped (unaffected)"; }
          {
            echo "## Production Deployment Summary"
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo ""
            echo "| Target | Result |"
            echo "|--------|--------|"
            echo "| API | $(gate '${{ needs.setup.outputs.api }}') |"
            echo "| API migrations | $(gate '${{ needs.setup.outputs.migrations }}') |"
            echo "| Amplify frontend | $(gate '${{ needs.setup.outputs.frontend }}') |"
            echo ""
            echo "**API URL:** https://forms.alpha.gov.bb"
            echo ""
            echo "Check API logs: \`aws logs tail /ecs/simple-service-builder-prod-api --follow\`"
          } >> "$GITHUB_STEP_SUMMARY"
