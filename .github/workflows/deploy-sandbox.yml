name: Deploy Sandbox

on:
  push:
    branches: [sandbox]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1
  ECR_REPOSITORY: modular-forms-api
  ECS_CLUSTER: modular-forms-sandbox
  ECS_SERVICE: modular-forms-api-sandbox

jobs:
  deploy:
    name: Build, Push & Deploy to Sandbox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$REGISTRY/$ECR_REPOSITORY:latest"

          docker build --platform linux/amd64 -f apps/api/Dockerfile -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed $IMAGE_URI"

      - name: Get current task definition
        id: task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition modular-forms-api-sandbox \
            --region $AWS_REGION \
            --query taskDefinition \
            --output json > task-def.json
          echo "✅ Task definition fetched"

      - name: Update task definition with new image
        id: new-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: api
          image: ${{ steps.build.outputs.image }}

      - name: Run database migrations
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$(cat ${{ steps.new-task-def.outputs.task-definition }} | \
              jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')" \
            --region $AWS_REGION \
            --query taskDefinition.taskDefinitionArn \
            --output text)
          echo "Registered migration task def: $TASK_DEF_ARN"

          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0dc6c8333012885b5,subnet-016eb706debe10250],securityGroups=[sg-05bfeab97a70e1081],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["pnpm","migration:run"]}]}' \
            --region $AWS_REGION \
            --query tasks[0].taskArn \
            --output text)
          echo "Migration task started: $TASK_ARN"

          echo "Waiting for migration task to complete..."
          aws ecs wait tasks-stopped \
            --cluster $ECS_CLUSTER \
            --tasks "$TASK_ARN" \
            --region $AWS_REGION

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks "$TASK_ARN" \
            --region $AWS_REGION \
            --query "tasks[0].containers[?name=='api'].exitCode | [0]" \
            --output text)
          echo "Migration exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration failed with exit code $EXIT_CODE"
            echo "Check logs: aws logs tail /ecs/modular-forms-api-sandbox --follow"
            exit 1
          fi
          echo "✅ Migrations completed successfully"

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.new-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # Task definition revision cleanup removed — old revisions don't consume
      # resources and deregistering them causes OpenTofu state drift (the revision
      # tofu tracks gets deregistered, making tofu think the resource is gone).
      # AWS allows thousands of revisions per family, so this is safe to skip.

      - name: Monitor Amplify build (forms)
        id: amplify
        env:
          AMPLIFY_APP_ID: d1yjf5g5ckxcxg
          AMPLIFY_BRANCH: sandbox
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Amplify forms job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify forms status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify forms build succeeded"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify forms build $STATUS"
              exit 1
            fi
            sleep 30
          done

      - name: Monitor Amplify build (landing)
        id: amplify-landing
        env:
          AMPLIFY_APP_ID: d3kbl8o0ovutw4
          AMPLIFY_BRANCH: sandbox
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Amplify landing job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify landing status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify landing build succeeded"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify landing build $STATUS"
              exit 1
            fi
            sleep 30
          done

      - name: Summary
        if: always()
        run: |
          echo "## Sandbox Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**API Image:** ${{ steps.build.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**API URL:** https://forms.api.sandbox.alpha.gov.bb" >> "$GITHUB_STEP_SUMMARY"
          echo "**Landing URL:** https://sandbox.alpha.gov.bb" >> "$GITHUB_STEP_SUMMARY"
          echo "**Forms URL:** https://forms.sandbox.alpha.gov.bb" >> "$GITHUB_STEP_SUMMARY"
