name: PR Preview

# Per-PR Amplify previews for the 4 frontend apps. On a non-draft PR
# (or draft → ready_for_review), nx-affected determines which apps
# changed; each affected app gets a build on its sandbox Amplify app
# under a per-PR branch, and a sticky comment with URLs is posted on
# the PR. On PR close, the per-PR branches are deleted from all 4 apps.
#
# Design notes in docs/plans/amplify-pr-previews.md.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  # id-token (AWS OIDC) and pull-requests (sticky preview comment) are used by
  # this workflow's jobs; per-job scoping tracked in #1462.
  id-token: write       # zizmor: ignore[excessive-permissions] OIDC for the AWS role
  contents: read        # checkout
  pull-requests: write  # zizmor: ignore[excessive-permissions] sticky comment

# Per-PR concurrency; cancel in-flight runs on new push. Mirrors
# Vercel-style "latest commit wins" for ephemeral previews.
# (deploy-sandbox.yml does the opposite — `cancel-in-progress: false`
# is correct there because half-applied real deploys are dangerous.)
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: ca-central-1

jobs:
  # Determine which of the 4 frontend apps the PR actually touches, so
  # unchanged apps are skipped. Mirrors the `setup` job in
  # .github/workflows/deploy-sandbox.yml, but uses
  # `--base=origin/<target>` instead of nx-set-shas — for pull_request
  # events the right base is the PR target branch, not the last
  # successful deploy.
  setup:
    name: Detect affected apps
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      forms: ${{ steps.affected.outputs.forms }}
      landing: ${{ steps.affected.outputs.landing }}
      chat: ${{ steps.affected.outputs.chat }}
      fb-app: ${{ steps.affected.outputs.fb-app }}
      amplify-config: ${{ steps.affected.outputs.amplify-config }}
      term-leave-contract-changed: ${{ steps.affected.outputs.term-leave-contract-changed }}
    steps:
      # Defensive mirror of the teardown guard: refuse the whole preview
      # pipeline for a head branch named after a long-lived branch, so a
      # protected name never gets a create-branch in the preview jobs.
      # Also reject branch names containing a '.': Amplify's default-domain
      # cert is a single-label wildcard (*.<appId>.amplifyapp.com), so a
      # dotted branch produces a multi-label subdomain whose preview fails
      # TLS with ERR_CERT_COMMON_NAME_INVALID — unreachable for humans and
      # the smoke test alike. Fail fast with a clear message instead.
      - name: Guard branch name
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          case "$BRANCH_NAME" in
            sandbox|main|staging|prod|production|dev)
              echo "❌ Refusing PR preview for protected branch name '$BRANCH_NAME' — these map to live Amplify environments."
              exit 1 ;;
          esac
          case "$BRANCH_NAME" in
            *.*)
              echo "❌ Refusing PR preview for branch name '$BRANCH_NAME' — it contains a '.'."
              echo "   Amplify's default-domain wildcard TLS cert only covers a single subdomain label,"
              echo "   so a dotted preview URL fails with ERR_CERT_COMMON_NAME_INVALID. Rename the branch"
              echo "   to use '-' instead of '.' (e.g. 'feature-v1-3-0')."
              exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          # Full history so nx affected and the path-diff for
          # amplify-config can compare against the PR's target branch.
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Compute affected apps
        id: affected
        env:
          NX_BASE: origin/${{ github.base_ref }}
          NX_HEAD: HEAD
        run: |
          AFFECTED=$(pnpm exec nx show projects \
            --affected --base="$NX_BASE" --head="$NX_HEAD" --type app --json 2>/dev/null || echo '[]')
          echo "Affected apps: $AFFECTED"
          has() { echo "$AFFECTED" | jq -e --arg p "$1" 'index($p)' >/dev/null && echo true || echo false; }

          echo "forms=$(has forms)" >> "$GITHUB_OUTPUT"
          echo "landing=$(has landing)" >> "$GITHUB_OUTPUT"
          echo "chat=$(has chat)" >> "$GITHUB_OUTPUT"
          echo "fb-app=$(has form-builder-app)" >> "$GITHUB_OUTPUT"

          # amplify.yml is a workspace-root file nx can't attribute to
          # any app. Force all 4 frontend gates when it or this
          # workflow itself changes (same escape hatch as
          # deploy-sandbox.yml).
          if git diff --name-only "$NX_BASE" "$NX_HEAD" \
              | grep -qE '^(amplify\.yml|\.github/workflows/pr-preview\.yml)$'; then
            echo "amplify-config=true" >> "$GITHUB_OUTPUT"
          else
            echo "amplify-config=false" >> "$GITHUB_OUTPUT"
          fi

          # The per-PR preview smoke drives the term-leave form on the preview
          # frontend, which fetches contracts from the SANDBOX API — so it can
          # only validate a recipe already live on sandbox (ADR 0029). When this
          # PR changes the term-leave recipe (or its smoke spec), the preview
          # would run the new spec against the OLD sandbox contract and is
          # guaranteed to fail. Flag that so the preview smoke is skipped; the
          # post-deploy smoke in deploy-sandbox.yml validates the new recipe once
          # it ships.
          if git diff --name-only "$NX_BASE" "$NX_HEAD" \
              | grep -qE '^(apps/api/src/forms/form-definitions/recipes/term-leave-application/|apps/forms/e2e/smoke/term-leave-application\.smoke\.spec\.ts$)'; then
            echo "term-leave-contract-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "term-leave-contract-changed=false" >> "$GITHUB_OUTPUT"
          fi

  preview-forms:
    name: Preview (forms)
    needs: setup
    if: needs.setup.outputs.forms == 'true' || needs.setup.outputs.amplify-config == 'true'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.build.outputs.status }}
      url: ${{ steps.build.outputs.url }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create branch and trigger preview build
        id: build
        env:
          # Forms homepage at forms.sandbox.alpha.gov.bb.
          # NOT d1yjf5g5ckxcxg — that is the archived legacy monorepo app.
          AMPLIFY_APP_ID: d1j7z1k0h7u5nb
          APP_LABEL: forms
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          # Idempotent branch creation: only call create-branch if
          # get-branch shows the branch doesn't already exist on this
          # Amplify app. This works across PR open + subsequent pushes.
          if ! aws amplify get-branch \
                --app-id "$AMPLIFY_APP_ID" \
                --branch-name "$BRANCH_NAME" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Creating Amplify branch $BRANCH_NAME on $AMPLIFY_APP_ID"
            aws amplify create-branch \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --region "$AWS_REGION" >/dev/null
          else
            echo "Amplify branch $BRANCH_NAME already exists on $AMPLIFY_APP_ID"
          fi

          # Subdomain replaces `/` with `-`.
          SUBDOMAIN="${BRANCH_NAME//\//-}"
          URL="https://${SUBDOMAIN}.${AMPLIFY_APP_ID}.amplifyapp.com"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

          # Cancel any in-flight Amplify jobs on this branch before
          # queueing a new one. start-job fails with
          # LimitExceededException if a non-terminal job already exists
          # for the branch — our latest-commit-wins concurrency model
          # means we want the older build dropped. Scoped per branch:
          # list-jobs and stop-job both require --branch-name, so this
          # cannot touch sandbox/staging/prod or other PR branches.
          IN_FLIGHT=$(aws amplify list-jobs \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_REGION" \
            --query "jobSummaries[?status=='CREATED' || status=='PENDING' || status=='PROVISIONING' || status=='RUNNING'].jobId" \
            --output text)
          for J in $IN_FLIGHT; do
            echo "Cancelling in-flight Amplify $APP_LABEL job $J"
            aws amplify stop-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$J" \
              --region "$AWS_REGION" >/dev/null \
              || echo "stop-job failed for $J (continuing)"
          done
          # Brief wait so the cancellation registers before start-job.
          [ -n "$IN_FLIGHT" ] && sleep 5

          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text 2>&1) || {
            echo "❌ Amplify $APP_LABEL start-job failed: $JOB_ID"
            echo "status=START_FAILED" >> "$GITHUB_OUTPUT"
            exit 1
          }
          echo "Amplify $APP_LABEL job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify $APP_LABEL status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify $APP_LABEL build succeeded"
              echo "status=SUCCEED" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify $APP_LABEL build $STATUS"
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify $APP_LABEL build did not finish within 15 minutes"
          echo "status=TIMED_OUT" >> "$GITHUB_OUTPUT"
          exit 1

  # Live end-to-end smoke test of the per-PR forms preview: drives the real
  # "term-leave-application" form against the branch's own Amplify deployment,
  # SUBMITS FOR REAL, and asserts the confirmation screen. `needs: preview-forms`
  # and gated on its SUCCEED status, so it runs only once the preview build is
  # live — and is skipped whenever forms wasn't previewed. No AWS creds: it
  # drives a headless browser against the public preview URL. The form has no
  # uploads, so no presign/S3 flow is exercised. See ADR 0030 — this is the
  # per-PR-preview counterpart to the post-deploy smoke in deploy-sandbox.yml.
  # Steps live in .github/workflows/forms-smoke.yml; the preview URL built by
  # preview-forms is passed as base_url.
  smoke-test-forms-preview:
    name: Smoke test forms preview (term-leave)
    needs: [setup, preview-forms]
    # Runs only when the preview built AND this PR does NOT change the
    # term-leave recipe/spec. A contract change can't be preview-smoked — the
    # preview frontend serves the sandbox API's OLD recipe, so the updated spec
    # would always fail until the new version ships (ADR 0029). Those PRs are
    # covered post-deploy by smoke-test-term-leave in deploy-sandbox.yml.
    if: >
      needs.preview-forms.result == 'success'
      && needs.preview-forms.outputs.status == 'SUCCEED'
      && needs.setup.outputs.term-leave-contract-changed == 'false'
    uses: ./.github/workflows/forms-smoke.yml
    with:
      base_url: ${{ needs.preview-forms.outputs.url }}
      spec: term-leave-application.smoke.spec.ts
      artifact_name: term-leave-preview-smoke-trace
    secrets:
      smoke_submission_token: ${{ secrets.SMOKE_SUBMISSION_TOKEN }}

  preview-landing:
    name: Preview (landing)
    needs: setup
    if: needs.setup.outputs.landing == 'true' || needs.setup.outputs.amplify-config == 'true'
