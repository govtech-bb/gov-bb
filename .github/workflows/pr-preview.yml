              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify $APP_LABEL build did not finish within 15 minutes"
          echo "status=TIMED_OUT" >> "$GITHUB_OUTPUT"
          exit 1

  preview-chat:
    name: Preview (chat)
    needs: setup
