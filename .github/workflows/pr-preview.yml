name: PR Preview

# Per-PR Amplify previews for the 4 frontend apps. On a non-draft PR
# (or draft → ready_for_review), nx-affected determines which apps
# changed; each affected app gets a build on its sandbox Amplify app
# under a per-PR branch, and a sticky comment with URLs is posted on
# the PR. On PR close, the per-PR branches are deleted from all 4 apps.
#
# Design notes in docs/plans/amplify-pr-previews.md.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  # Minimal workflow-level default. The elevated grants are scoped per job to
  # the jobs that actually need them (gov-bb-security#4): only the preview jobs
  # and teardown request `id-token: write` (AWS OIDC), and only `comment`
  # requests `pull-requests: write` (sticky comment). The `setup` job — which
  # checks out PR code and runs `pnpm install` — gets `contents: read` only, so
  # a poisoned dependency lifecycle script can't reach the OIDC token. The
  # forms-smoke / forms-a11y reusable-workflow calls inherit this default (they
  # need only checkout + artifact upload).
  contents: read

# Per-PR concurrency; cancel in-flight runs on new push. Mirrors
# Vercel-style "latest commit wins" for ephemeral previews.
# (deploy-sandbox.yml does the opposite — `cancel-in-progress: false`
# is correct there because half-applied real deploys are dangerous.)
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: ca-central-1

jobs:
  # Determine which of the 4 frontend apps the PR actually touches, so
  # unchanged apps are skipped. Mirrors the `setup` job in
  # .github/workflows/deploy-sandbox.yml, but uses
  # `--base=origin/<target>` instead of nx-set-shas — for pull_request
  # events the right base is the PR target branch, not the last
  # successful deploy.
  setup:
    name: Detect affected apps
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    # Checks out PR code and runs `pnpm install` — no AWS/OIDC token in scope.
    permissions:
      contents: read
    outputs:
      forms: ${{ steps.affected.outputs.forms }}
      landing: ${{ steps.affected.outputs.landing }}
      chat: ${{ steps.affected.outputs.chat }}
      fb-app: ${{ steps.affected.outputs.fb-app }}
      analytics: ${{ steps.affected.outputs.analytics }}
      amplify-config: ${{ steps.affected.outputs.amplify-config }}
      preview-smoke-contract-changed: ${{ steps.affected.outputs.preview-smoke-contract-changed }}
    steps:
      # Defensive mirror of the teardown guard: refuse the whole preview
      # pipeline for a head branch named after a long-lived branch, so a
      # protected name never gets a create-branch in the preview jobs.
      # Also reject branch names containing a '.': Amplify's default-domain
      # cert is a single-label wildcard (*.<appId>.amplifyapp.com), so a
      # dotted branch produces a multi-label subdomain whose preview fails
      # TLS with ERR_CERT_COMMON_NAME_INVALID — unreachable for humans and
      # the smoke test alike. Fail fast with a clear message instead.
      - name: Guard branch name
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          case "$BRANCH_NAME" in
            sandbox|main|staging|prod|production|dev)
              echo "❌ Refusing PR preview for protected branch name '$BRANCH_NAME' — these map to live Amplify environments."
              exit 1 ;;
          esac
          case "$BRANCH_NAME" in
            *.*)
              echo "❌ Refusing PR preview for branch name '$BRANCH_NAME' — it contains a '.'."
              echo "   Amplify's default-domain wildcard TLS cert only covers a single subdomain label,"
              echo "   so a dotted preview URL fails with ERR_CERT_COMMON_NAME_INVALID. Rename the branch"
              echo "   to use '-' instead of '.' (e.g. 'feature-v1-3-0')."
              exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          # Full history so nx affected and the path-diff for
          # amplify-config can compare against the PR's target branch.
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      # --ignore-scripts: this job only needs the dependency graph for `nx show
      # projects --affected` — nothing here needs a build/lifecycle script.
      # Disable them as defense-in-depth so a poisoned lifecycle script in a
      # PR-added dependency can't execute on the runner (gov-bb-security#4).
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Compute affected apps
        id: affected
        env:
          NX_BASE: origin/${{ github.base_ref }}
          NX_HEAD: HEAD
        run: |
          AFFECTED=$(pnpm exec nx show projects \
            --affected --base="$NX_BASE" --head="$NX_HEAD" --type app --json 2>/dev/null || echo '[]')
          echo "Affected apps: $AFFECTED"
          has() { echo "$AFFECTED" | jq -e --arg p "$1" 'index($p)' >/dev/null && echo true || echo false; }

          echo "forms=$(has forms)" >> "$GITHUB_OUTPUT"
          echo "landing=$(has landing)" >> "$GITHUB_OUTPUT"
          echo "chat=$(has chat)" >> "$GITHUB_OUTPUT"
          echo "fb-app=$(has form-builder-app)" >> "$GITHUB_OUTPUT"
          echo "analytics=$(has analytics-app)" >> "$GITHUB_OUTPUT"

          # amplify.yml is a workspace-root file nx can't attribute to
          # any app. Force all 6 frontend gates when it or this
          # workflow itself changes (same escape hatch as
          # deploy-sandbox.yml).
          if git diff --name-only "$NX_BASE" "$NX_HEAD" \
              | grep -qE '^(amplify\.yml|\.github/workflows/pr-preview\.yml)$'; then
            echo "amplify-config=true" >> "$GITHUB_OUTPUT"
          else
            echo "amplify-config=false" >> "$GITHUB_OUTPUT"
          fi

          # The per-PR preview smoke drives the jobstart-plus-programme form on
          # the preview frontend, which fetches contracts from the SANDBOX API —
          # so it can only validate a recipe already live on sandbox (ADR 0029).
          # (It must be a PUBLIC form: the preview frontend hits the sandbox API,
          # which 404s non-public forms (#1646).) When this PR changes that recipe
          # (or its smoke spec), the preview would run the new spec against the
          # OLD sandbox contract and is guaranteed to fail. Flag that so the
          # preview smoke is skipped; the post-deploy smoke in deploy-sandbox.yml
          # validates the new recipe once it ships.
          if git diff --name-only "$NX_BASE" "$NX_HEAD" \
              | grep -qE '^(apps/api/src/forms/form-definitions/recipes/jobstart-plus-programme\.json$|apps/forms/e2e/smoke/jobstart-plus-programme\.smoke\.spec\.ts$)'; then
            echo "preview-smoke-contract-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "preview-smoke-contract-changed=false" >> "$GITHUB_OUTPUT"
          fi

  preview-forms:
    name: Preview (forms)
    needs: setup
    if: needs.setup.outputs.forms == 'true' || needs.setup.outputs.amplify-config == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for the AWS role (configure-aws-credentials)
      contents: read
    outputs:
      status: ${{ steps.build.outputs.status }}
      url: ${{ steps.build.outputs.url }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create branch and trigger preview build
        id: build
        env:
          # Forms homepage at forms.sandbox.alpha.gov.bb.
          # NOT d1yjf5g5ckxcxg — that is the archived legacy monorepo app.
          AMPLIFY_APP_ID: d1j7z1k0h7u5nb
          APP_LABEL: forms
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          # Idempotent branch creation: only call create-branch if
          # get-branch shows the branch doesn't already exist on this
          # Amplify app. This works across PR open + subsequent pushes.
          if ! aws amplify get-branch \
                --app-id "$AMPLIFY_APP_ID" \
                --branch-name "$BRANCH_NAME" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Creating Amplify branch $BRANCH_NAME on $AMPLIFY_APP_ID"
            aws amplify create-branch \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --region "$AWS_REGION" >/dev/null
          else
            echo "Amplify branch $BRANCH_NAME already exists on $AMPLIFY_APP_ID"
          fi

          # Subdomain replaces `/` with `-`.
          SUBDOMAIN="${BRANCH_NAME//\//-}"
          URL="https://${SUBDOMAIN}.${AMPLIFY_APP_ID}.amplifyapp.com"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

          # Cancel any in-flight Amplify jobs on this branch before
          # queueing a new one. start-job fails with
          # LimitExceededException if a non-terminal job already exists
          # for the branch — our latest-commit-wins concurrency model
          # means we want the older build dropped. Scoped per branch:
          # list-jobs and stop-job both require --branch-name, so this
          # cannot touch sandbox/staging/prod or other PR branches.
          IN_FLIGHT=$(aws amplify list-jobs \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_REGION" \
            --query "jobSummaries[?status=='CREATED' || status=='PENDING' || status=='PROVISIONING' || status=='RUNNING'].jobId" \
            --output text)
          for J in $IN_FLIGHT; do
            echo "Cancelling in-flight Amplify $APP_LABEL job $J"
            aws amplify stop-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$J" \
              --region "$AWS_REGION" >/dev/null \
              || echo "stop-job failed for $J (continuing)"
          done
          # Brief wait so the cancellation registers before start-job.
          [ -n "$IN_FLIGHT" ] && sleep 5

          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text 2>&1) || {
            echo "❌ Amplify $APP_LABEL start-job failed: $JOB_ID"
            echo "status=START_FAILED" >> "$GITHUB_OUTPUT"
            exit 1
          }
          echo "Amplify $APP_LABEL job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify $APP_LABEL status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify $APP_LABEL build succeeded"
              echo "status=SUCCEED" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify $APP_LABEL build $STATUS"
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify $APP_LABEL build did not finish within 15 minutes"
          echo "status=TIMED_OUT" >> "$GITHUB_OUTPUT"
          exit 1

  # Live end-to-end smoke test of the per-PR forms preview: drives the real
  # "jobstart-plus-programme" form against the branch's own Amplify deployment,
  # SUBMITS FOR REAL, and asserts the confirmation screen. `needs: preview-forms`
  # and gated on its SUCCEED status, so it runs only once the preview build is
  # live — and is skipped whenever forms wasn't previewed. No AWS creds: it
  # drives a headless browser against the public preview URL. The form has no
  # uploads, so no presign/S3 flow is exercised. It must be a PUBLIC form —
  # the preview frontend reads the sandbox API, which 404s non-public forms
  # (#1646). See ADR 0030 — this is the per-PR-preview counterpart to the
  # post-deploy smoke in deploy-sandbox.yml. Steps live in
  # .github/workflows/forms-smoke.yml; the preview URL built by preview-forms is
  # passed as base_url.
  smoke-test-forms-preview:
    name: Smoke test forms preview (jobstart-plus)
    needs: [setup, preview-forms]
    # Runs only when the preview built AND this PR does NOT change the
    # jobstart-plus-programme recipe/spec AND it doesn't target prod. A contract
    # change can't be preview-smoked — the preview frontend serves the sandbox
    # API's OLD recipe, so the updated spec would always fail until the new
    # version ships (ADR 0029). The same skew applies to prod-targeted PRs
    # (hotfixes/restores): their frontend carries prod's contract, which can lag
    # the sandbox API the preview always points at, so the smoke would spuriously
    # fail. Both cases are covered post-deploy by smoke-test-forms in
    # deploy-{sandbox,prod}.yml.
    if: >
      needs.preview-forms.result == 'success'
      && needs.preview-forms.outputs.status == 'SUCCEED'
      && needs.setup.outputs.preview-smoke-contract-changed == 'false'
      && github.event.pull_request.base.ref != 'prod'
    uses: ./.github/workflows/forms-smoke.yml
    with:
      base_url: ${{ needs.preview-forms.outputs.url }}
      spec: jobstart-plus-programme.smoke.spec.ts
      artifact_name: jobstart-plus-preview-smoke-trace
    secrets:
      smoke_submission_token: ${{ secrets.SMOKE_SUBMISSION_TOKEN }}

  # Live accessibility (axe) scan of the per-PR forms preview. Loads key pages
  # and scans the rendered DOM — it NEVER submits, so (unlike the smoke above) it
  # has no contract-skew dependency and runs on every previewed PR, prod-targeted
  # or not. Fails only on serious/critical WCAG A/AA violations. Steps live in
  # .github/workflows/forms-a11y.yml; the preview URL from preview-forms is
  # passed as base_url.
  a11y-forms-preview:
    name: A11y scan forms preview
    needs: [setup, preview-forms]
    if: >
      needs.preview-forms.result == 'success'
      && needs.preview-forms.outputs.status == 'SUCCEED'
    uses: ./.github/workflows/forms-a11y.yml
    with:
      base_url: ${{ needs.preview-forms.outputs.url }}
      artifact_name: forms-preview-a11y-trace

  preview-landing:
    name: Preview (landing)
    needs: setup
    if: needs.setup.outputs.landing == 'true' || needs.setup.outputs.amplify-config == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for the AWS role (configure-aws-credentials)
      contents: read
    outputs:
      status: ${{ steps.build.outputs.status }}
      url: ${{ steps.build.outputs.url }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create branch and trigger preview build
        id: build
        env:
          AMPLIFY_APP_ID: d3kbl8o0ovutw4
          APP_LABEL: landing
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if ! aws amplify get-branch \
                --app-id "$AMPLIFY_APP_ID" \
                --branch-name "$BRANCH_NAME" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Creating Amplify branch $BRANCH_NAME on $AMPLIFY_APP_ID"
            aws amplify create-branch \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --region "$AWS_REGION" >/dev/null
          else
            echo "Amplify branch $BRANCH_NAME already exists on $AMPLIFY_APP_ID"
          fi

          SUBDOMAIN="${BRANCH_NAME//\//-}"
          URL="https://${SUBDOMAIN}.${AMPLIFY_APP_ID}.amplifyapp.com"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

          # Cancel any in-flight Amplify jobs on this branch before
          # queueing a new one. start-job fails with
          # LimitExceededException if a non-terminal job already exists
          # for the branch — our latest-commit-wins concurrency model
          # means we want the older build dropped. Scoped per branch:
          # list-jobs and stop-job both require --branch-name, so this
          # cannot touch sandbox/staging/prod or other PR branches.
          IN_FLIGHT=$(aws amplify list-jobs \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_REGION" \
            --query "jobSummaries[?status=='CREATED' || status=='PENDING' || status=='PROVISIONING' || status=='RUNNING'].jobId" \
            --output text)
          for J in $IN_FLIGHT; do
            echo "Cancelling in-flight Amplify $APP_LABEL job $J"
            aws amplify stop-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$J" \
              --region "$AWS_REGION" >/dev/null \
              || echo "stop-job failed for $J (continuing)"
          done
          # Brief wait so the cancellation registers before start-job.
          [ -n "$IN_FLIGHT" ] && sleep 5

          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text 2>&1) || {
            echo "❌ Amplify $APP_LABEL start-job failed: $JOB_ID"
            echo "status=START_FAILED" >> "$GITHUB_OUTPUT"
            exit 1
          }
          echo "Amplify $APP_LABEL job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify $APP_LABEL status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify $APP_LABEL build succeeded"
              echo "status=SUCCEED" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify $APP_LABEL build $STATUS"
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify $APP_LABEL build did not finish within 15 minutes"
          echo "status=TIMED_OUT" >> "$GITHUB_OUTPUT"
          exit 1

  preview-chat:
    name: Preview (chat)
    needs: setup
    if: needs.setup.outputs.chat == 'true' || needs.setup.outputs.amplify-config == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for the AWS role (configure-aws-credentials)
      contents: read
    outputs:
      status: ${{ steps.build.outputs.status }}
      url: ${{ steps.build.outputs.url }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create branch and trigger preview build
        id: build
        env:
          AMPLIFY_APP_ID: d3snq1f0c10466
          APP_LABEL: chat
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if ! aws amplify get-branch \
                --app-id "$AMPLIFY_APP_ID" \
                --branch-name "$BRANCH_NAME" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Creating Amplify branch $BRANCH_NAME on $AMPLIFY_APP_ID"
            aws amplify create-branch \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --region "$AWS_REGION" >/dev/null
          else
            echo "Amplify branch $BRANCH_NAME already exists on $AMPLIFY_APP_ID"
          fi

          SUBDOMAIN="${BRANCH_NAME//\//-}"
          URL="https://${SUBDOMAIN}.${AMPLIFY_APP_ID}.amplifyapp.com"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

          # Cancel any in-flight Amplify jobs on this branch before
          # queueing a new one. start-job fails with
          # LimitExceededException if a non-terminal job already exists
          # for the branch — our latest-commit-wins concurrency model
          # means we want the older build dropped. Scoped per branch:
          # list-jobs and stop-job both require --branch-name, so this
          # cannot touch sandbox/staging/prod or other PR branches.
          IN_FLIGHT=$(aws amplify list-jobs \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_REGION" \
            --query "jobSummaries[?status=='CREATED' || status=='PENDING' || status=='PROVISIONING' || status=='RUNNING'].jobId" \
            --output text)
          for J in $IN_FLIGHT; do
            echo "Cancelling in-flight Amplify $APP_LABEL job $J"
            aws amplify stop-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$J" \
              --region "$AWS_REGION" >/dev/null \
              || echo "stop-job failed for $J (continuing)"
          done
          # Brief wait so the cancellation registers before start-job.
          [ -n "$IN_FLIGHT" ] && sleep 5

          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text 2>&1) || {
            echo "❌ Amplify $APP_LABEL start-job failed: $JOB_ID"
            echo "status=START_FAILED" >> "$GITHUB_OUTPUT"
            exit 1
          }
          echo "Amplify $APP_LABEL job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify $APP_LABEL status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify $APP_LABEL build succeeded"
              echo "status=SUCCEED" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify $APP_LABEL build $STATUS"
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify $APP_LABEL build did not finish within 15 minutes"
          echo "status=TIMED_OUT" >> "$GITHUB_OUTPUT"
          exit 1

  preview-form-builder:
    name: Preview (form-builder)
    needs: setup
    if: needs.setup.outputs.fb-app == 'true' || needs.setup.outputs.amplify-config == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for the AWS role (configure-aws-credentials)
      contents: read
    outputs:
      status: ${{ steps.build.outputs.status }}
      url: ${{ steps.build.outputs.url }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create branch and trigger preview build
        id: build
        env:
          AMPLIFY_APP_ID: d16oo4n0w76zwn
          APP_LABEL: form-builder
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if ! aws amplify get-branch \
                --app-id "$AMPLIFY_APP_ID" \
                --branch-name "$BRANCH_NAME" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Creating Amplify branch $BRANCH_NAME on $AMPLIFY_APP_ID"
            aws amplify create-branch \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --region "$AWS_REGION" >/dev/null
          else
            echo "Amplify branch $BRANCH_NAME already exists on $AMPLIFY_APP_ID"
          fi

          SUBDOMAIN="${BRANCH_NAME//\//-}"
          URL="https://${SUBDOMAIN}.${AMPLIFY_APP_ID}.amplifyapp.com"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

          # Cancel any in-flight Amplify jobs on this branch before
          # queueing a new one. start-job fails with
          # LimitExceededException if a non-terminal job already exists
          # for the branch — our latest-commit-wins concurrency model
          # means we want the older build dropped. Scoped per branch:
          # list-jobs and stop-job both require --branch-name, so this
          # cannot touch sandbox/staging/prod or other PR branches.
          IN_FLIGHT=$(aws amplify list-jobs \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_REGION" \
            --query "jobSummaries[?status=='CREATED' || status=='PENDING' || status=='PROVISIONING' || status=='RUNNING'].jobId" \
            --output text)
          for J in $IN_FLIGHT; do
            echo "Cancelling in-flight Amplify $APP_LABEL job $J"
            aws amplify stop-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$J" \
              --region "$AWS_REGION" >/dev/null \
              || echo "stop-job failed for $J (continuing)"
          done
          # Brief wait so the cancellation registers before start-job.
          [ -n "$IN_FLIGHT" ] && sleep 5

          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text 2>&1) || {
            echo "❌ Amplify $APP_LABEL start-job failed: $JOB_ID"
            echo "status=START_FAILED" >> "$GITHUB_OUTPUT"
            exit 1
          }
          echo "Amplify $APP_LABEL job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify $APP_LABEL status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify $APP_LABEL build succeeded"
              echo "status=SUCCEED" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify $APP_LABEL build $STATUS"
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify $APP_LABEL build did not finish within 15 minutes"
          echo "status=TIMED_OUT" >> "$GITHUB_OUTPUT"
          exit 1

  preview-analytics:
    name: Preview (analytics)
    needs: setup
    if: needs.setup.outputs.analytics == 'true' || needs.setup.outputs.amplify-config == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for the AWS role (configure-aws-credentials)
      contents: read
    outputs:
      status: ${{ steps.build.outputs.status }}
      url: ${{ steps.build.outputs.url }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create branch and trigger preview build
        id: build
        env:
          # analytics dashboard (apps/analytics SSR) at analytics.sandbox.alpha.gov.bb.
          # Public (robots:noindex), so the preview is fully usable. Its UMAMI_*/
          # VITE_FORMS_API_URL build config is NOT app-level (the deploy pipeline
          # injects it per-deploy via update-app), so a fresh preview branch has
          # none and the dashboard renders "not configured". We set it below,
          # branch-scoped, from the same repo secrets deploy-sandbox.yml uses.
          AMPLIFY_APP_ID: d363pae4e63dc6
          APP_LABEL: analytics
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          UMAMI_API_KEY: ${{ secrets.UMAMI_API_KEY }}
          UMAMI_LANDING_WEBSITE_ID: ${{ secrets.UMAMI_LANDING_WEBSITE_ID }}
          UMAMI_FORMS_WEBSITE_ID: ${{ secrets.UMAMI_FORMS_WEBSITE_ID }}
          VITE_FORMS_API_URL: https://forms.api.sandbox.alpha.gov.bb
        run: |
          if ! aws amplify get-branch \
                --app-id "$AMPLIFY_APP_ID" \
                --branch-name "$BRANCH_NAME" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Creating Amplify branch $BRANCH_NAME on $AMPLIFY_APP_ID"
            aws amplify create-branch \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --region "$AWS_REGION" >/dev/null
          else
            echo "Amplify branch $BRANCH_NAME already exists on $AMPLIFY_APP_ID"
          fi

          # Branch-scoped build env, so THIS preview builds configured without
          # touching the shared sandbox branch/app env. Merges with app-level
          # (AMPLIFY_MONOREPO_APP_ROOT etc.) at build time. Mirrors the var set
          # deploy-sandbox.yml's amplify-analytics job puts on the app.
          aws amplify update-branch \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_REGION" \
            --environment-variables "UMAMI_API_KEY=$UMAMI_API_KEY,UMAMI_LANDING_WEBSITE_ID=$UMAMI_LANDING_WEBSITE_ID,UMAMI_FORMS_WEBSITE_ID=$UMAMI_FORMS_WEBSITE_ID,VITE_FORMS_API_URL=$VITE_FORMS_API_URL" \
            >/dev/null
          echo "Set analytics build env on branch $BRANCH_NAME (values hidden)"

          SUBDOMAIN="${BRANCH_NAME//\//-}"
          URL="https://${SUBDOMAIN}.${AMPLIFY_APP_ID}.amplifyapp.com"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

          # Cancel any in-flight Amplify jobs on this branch before
          # queueing a new one. start-job fails with
          # LimitExceededException if a non-terminal job already exists
          # for the branch — our latest-commit-wins concurrency model
          # means we want the older build dropped. Scoped per branch:
          # list-jobs and stop-job both require --branch-name, so this
          # cannot touch sandbox/staging/prod or other PR branches.
          IN_FLIGHT=$(aws amplify list-jobs \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --region "$AWS_REGION" \
            --query "jobSummaries[?status=='CREATED' || status=='PENDING' || status=='PROVISIONING' || status=='RUNNING'].jobId" \
            --output text)
          for J in $IN_FLIGHT; do
            echo "Cancelling in-flight Amplify $APP_LABEL job $J"
            aws amplify stop-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$J" \
              --region "$AWS_REGION" >/dev/null \
              || echo "stop-job failed for $J (continuing)"
          done
          # Brief wait so the cancellation registers before start-job.
          [ -n "$IN_FLIGHT" ] && sleep 5

          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text 2>&1) || {
            echo "❌ Amplify $APP_LABEL start-job failed: $JOB_ID"
            echo "status=START_FAILED" >> "$GITHUB_OUTPUT"
            exit 1
          }
          echo "Amplify $APP_LABEL job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify $APP_LABEL status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify $APP_LABEL build succeeded"
              echo "status=SUCCEED" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify $APP_LABEL build $STATUS"
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify $APP_LABEL build did not finish within 15 minutes"
          echo "status=TIMED_OUT" >> "$GITHUB_OUTPUT"
          exit 1

  # Post or edit a single sticky comment on the PR listing the preview
  # URLs and their statuses. Runs after the 5 preview jobs reach any
  # terminal state (success, failure, or skip).
  comment:
    name: Post preview comment
    needs: [setup, preview-forms, preview-landing, preview-chat, preview-form-builder, preview-analytics]
    if: |
      always()
      && github.event.action != 'closed'
      && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # sticky preview comment
    steps:
      - name: Render comment body
        id: render
        env:
          FORMS_RESULT: ${{ needs.preview-forms.result }}
          FORMS_STATUS: ${{ needs.preview-forms.outputs.status }}
          FORMS_URL: ${{ needs.preview-forms.outputs.url }}
          LANDING_RESULT: ${{ needs.preview-landing.result }}
          LANDING_STATUS: ${{ needs.preview-landing.outputs.status }}
          LANDING_URL: ${{ needs.preview-landing.outputs.url }}
          CHAT_RESULT: ${{ needs.preview-chat.result }}
          CHAT_STATUS: ${{ needs.preview-chat.outputs.status }}
          CHAT_URL: ${{ needs.preview-chat.outputs.url }}
          FB_RESULT: ${{ needs.preview-form-builder.result }}
          FB_STATUS: ${{ needs.preview-form-builder.outputs.status }}
          FB_URL: ${{ needs.preview-form-builder.outputs.url }}
          ANALYTICS_RESULT: ${{ needs.preview-analytics.result }}
          ANALYTICS_STATUS: ${{ needs.preview-analytics.outputs.status }}
          ANALYTICS_URL: ${{ needs.preview-analytics.outputs.url }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Render one row per app. `result` is the GHA job result
          # ('success' / 'failure' / 'cancelled' / 'skipped'). When
          # skipped, the app wasn't affected — show a dash row.
          row() {
            local label="$1" result="$2" status="$3" url="$4"
            case "$result" in
              success)
                echo "| $label | ✅ Ready | [$url]($url) |"
                ;;
              failure)
                if [ "$status" = "START_FAILED" ]; then
                  # start-job itself was rejected (e.g. IAM, throttling,
                  # a transient AWS error past stop-job's window). No
                  # Amplify build was ever queued, so no preview URL
                  # exists — point at the workflow logs via the check
                  # link on the PR instead.
                  echo "| $label | ❌ Failed to queue build | — |"
                elif [ -n "$url" ]; then
                  echo "| $label | ❌ Failed ($status) | [build logs]($url) |"
                else
                  echo "| $label | ❌ Failed | — |"
                fi
                ;;
              cancelled)
                echo "| $label | ⏹ Cancelled | — |"
                ;;
              skipped|*)
                echo "| $label | ⏭ Not affected | — |"
                ;;
            esac
          }

          {
            echo "## Amplify PR previews"
            echo ""
            echo "| App | Status | URL |"
            echo "|---|---|---|"
            row "forms"           "$FORMS_RESULT"     "$FORMS_STATUS"     "$FORMS_URL"
            row "landing"         "$LANDING_RESULT"   "$LANDING_STATUS"   "$LANDING_URL"
            row "chat"            "$CHAT_RESULT"      "$CHAT_STATUS"      "$CHAT_URL"
            row "form-builder"    "$FB_RESULT"        "$FB_STATUS"        "$FB_URL"
            row "analytics"       "$ANALYTICS_RESULT" "$ANALYTICS_STATUS" "$ANALYTICS_URL"
            echo ""
            echo "_Commit: \`${COMMIT_SHA:0:7}\`_  ·  _Branches auto-delete when this PR closes._"
            echo ""
            echo "> ℹ️ **feature-flagging** uses a single shared preview slot at a fixed URL (\`preview.feature-flagging.sandbox.alpha.gov.bb\`) — GitHub login works, but only **one** FF preview exists at a time (the most recent FF PR build wins). It reads/writes **sandbox** flag data."
          } > comment.md

          # Hand the file path to the next step.
          echo "path=comment.md" >> "$GITHUB_OUTPUT"

      - name: Post or update sticky comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: amplify-pr-preview
          path: comment.md

  # On PR close, delete the per-PR Amplify branch from the 5 per-PR apps
  # (feature-flagging is excluded — it uses a shared, permanent slot).
  # The branch only exists on apps that were affected at some point in
  # this PR's life, so "not found" errors are swallowed.
  teardown:
    name: Delete preview branches
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for the AWS role (configure-aws-credentials)
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Delete branches on the 5 per-PR sandbox Amplify apps
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          # A PR whose head branch is named after a long-lived branch
          # (e.g. someone runs `git checkout -b sandbox`) would otherwise
          # delete-branch the LIVE sandbox Amplify branch on all 4 apps,
          # severing the real environment. Refuse outright.
          case "$BRANCH_NAME" in
            sandbox|main|staging|prod|production|dev)
              echo "❌ Refusing teardown for protected branch name '$BRANCH_NAME' — these map to live Amplify environments, not PR previews."
              exit 1 ;;
          esac

          # feature-flagging is NOT here: its PR previews were removed entirely
          # on 2026-07-21 (gov-bb#2029) — sandbox is the testing environment.
          for entry in \
              "forms:d1j7z1k0h7u5nb" \
              "landing:d3kbl8o0ovutw4" \
              "chat:d3snq1f0c10466" \
              "form-builder:d16oo4n0w76zwn" \
              "analytics:d363pae4e63dc6"; do
            label="${entry%%:*}"
            app_id="${entry##*:}"
            if aws amplify get-branch \
                  --app-id "$app_id" \
                  --branch-name "$BRANCH_NAME" \
                  --region "$AWS_REGION" >/dev/null 2>&1; then
              aws amplify delete-branch \
                --app-id "$app_id" \
                --branch-name "$BRANCH_NAME" \
                --region "$AWS_REGION" >/dev/null
              echo "🗑  Deleted $label branch $BRANCH_NAME ($app_id)"
            else
              echo "↷  No $label branch $BRANCH_NAME on $app_id (skipping)"
            fi
          done
