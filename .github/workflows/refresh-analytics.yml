name: Refresh Analytics Snapshot

# The /analytics page (apps/landing) renders STATIC data baked in at build time
# by scripts/generate-analytics-snapshot.ts — it never calls Umami at request
# time. "Refreshing" the live numbers therefore means triggering an Amplify
# RELEASE so the build re-runs the generator against the app's UMAMI_* build env
# and reships the page.
#
# Scheduled runs refresh SANDBOX only (a dedicated landing Amplify app, cheap to
# rebuild). Prod is a single Amplify app that rebuilds ALL prod frontends, so a
# prod refresh is opt-in via workflow_dispatch.
#
# Prerequisite: the landing Amplify app(s) must have UMAMI_API_KEY,
# UMAMI_LANDING_WEBSITE_ID, UMAMI_FORMS_WEBSITE_ID (and optionally
# UMAMI_API_URL / UMAMI_TIMEZONE) set as build environment variables. Without
# them the generator no-ops and the page shows "not yet generated".

on:
  schedule:
    # 06:00 UTC daily (≈02:00 America/Barbados). Adjust cadence here.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment(s) to refresh"
        type: choice
        default: sandbox
        options:
          - sandbox
          - prod
          - both

permissions:
  contents: read

concurrency:
  group: refresh-analytics-${{ github.event.inputs.environment || 'sandbox' }}
  cancel-in-progress: false

env:
  AWS_REGION: ca-central-1

jobs:
  refresh-sandbox:
    name: Refresh sandbox landing
    # Scheduled runs always refresh sandbox; manual runs honour the input.
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.environment == 'sandbox' ||
      github.event.inputs.environment == 'both'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Trigger and monitor Amplify build
        env:
          AMPLIFY_APP_ID: d3kbl8o0ovutw4
          AMPLIFY_BRANCH: sandbox
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text)
          echo "Amplify landing (sandbox) job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Analytics snapshot refreshed on sandbox"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify build $STATUS"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify build did not finish within 15 minutes"
          exit 1

  refresh-prod:
    name: Refresh prod landing
    # Prod is opt-in only (its single Amplify app rebuilds all prod frontends).
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.environment == 'prod' ||
       github.event.inputs.environment == 'both')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Trigger and monitor Amplify build
        env:
          # NOTE: this single prod Amplify app rebuilds ALL prod frontends.
          AMPLIFY_APP_ID: d25vfjylwqa51q
          AMPLIFY_BRANCH: prod
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query jobSummary.jobId \
            --output text)
          echo "Amplify (prod) job started: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query job.summary.status \
              --output text)
            echo "[$i/30] Amplify status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Analytics snapshot refreshed on prod"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify build $STATUS"
              exit 1
            fi
            sleep 30
          done
          echo "❌ Amplify build did not finish within 15 minutes"
          exit 1
