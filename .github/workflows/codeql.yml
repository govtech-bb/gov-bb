name: CodeQL (nightly)

# Moved off the PR critical path: security-extended is the heaviest CodeQL
# suite (~5-12 min) and was gating every build. It now runs nightly against
# sandbox and on demand, uploading results to the Security tab so Critical/High
# findings raise code-scanning alerts within a day instead of blocking PRs.
on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
