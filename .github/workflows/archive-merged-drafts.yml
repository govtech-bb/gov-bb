name: Archive merged drafts

on:
  push:
    branches: [dev]
    paths:
      - "recipes/**/*.json"

permissions:
  contents: read

jobs:
  archive:
    name: Archive draft DB rows for merged recipes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with enough history to diff before..after)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # We need both the `before` and `after` SHAs of the push reachable.
          # fetch-depth: 0 fetches all history. Cheaper alternatives like
          # fetch-depth: 50 could miss merges of long-lived branches, so we
          # pay the cost.
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Archive drafts via admin endpoint
        env:
          API_URL: ${{ secrets.ARCHIVE_DRAFTS_API_URL }}
          ARCHIVE_DRAFTS_TOKEN: ${{ secrets.ARCHIVE_DRAFTS_TOKEN }}
        run: pnpm tsx scripts/archive-merged-drafts.ts
