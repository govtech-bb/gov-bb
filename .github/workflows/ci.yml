name: CI

on:
  pull_request:
    branches: [main, sandbox, staging, dev]
  workflow_dispatch:

permissions:
  contents: read

# Latest push to a PR wins — cancel superseded in-progress runs. Safe because
# CI has no side effects (pull_request / workflow_dispatch only, no deploys).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      # Fails on dependency-version drift across workspace packages.
      # Deliberate splits (express 4/5, forms' eslint 9, react-markdown 9/10)
      # are ignored via flags in the script — see root package.json.
      - name: Dependency consistency (sherif)
        run: pnpm lint:deps

      - name: Run type check (tsc --build)
        id: typecheck
        run: |
          pnpm exec tsc -b 2>&1 | tee typecheck-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Report type check results
        if: steps.typecheck.outcome == 'failure'
        run: |
          ERROR_COUNT=$(grep -c "error TS" typecheck-output.txt 2>/dev/null || echo "?")

          echo "## ❌ Type Check Failed — ${ERROR_COUNT} error(s)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View type errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat typecheck-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pnpm exec tsc -b" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan current commit for secrets
        id: gitleaks_current
        run: |
          gitleaks detect --source . --verbose --config .gitleaks.toml --report-format json --report-path gitleaks-current.json 2>&1 | tee gitleaks-current-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Fetch full history and scan if secrets found
        id: gitleaks_history
        if: steps.gitleaks_current.outcome == 'failure'
        run: |
          echo "Secrets found in current commit. Checking git history for similar secrets..."
          git fetch --unshallow || git fetch --depth=1000
          gitleaks detect --source . --verbose --config .gitleaks.toml --report-format json --report-path gitleaks-history.json 2>&1 | tee gitleaks-history-output.txt || true
        continue-on-error: true

      - name: Analyze and report secrets
        if: steps.gitleaks_current.outcome == 'failure'
        run: |
          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          import os

          repo = os.environ.get('GITHUB_REPOSITORY', '')
          sha = os.environ.get('GITHUB_SHA', '')

          try:
              with open('gitleaks-current.json', 'r') as f:
                  current_data = json.load(f)
          except:
              current_data = []

          try:
              with open('gitleaks-history.json', 'r') as f:
                  history_data = json.load(f)
          except:
              history_data = []

          current_secrets = []
          historical_secrets = []

          current_files = set()
          for finding in current_data:
              file = finding.get('File', 'Unknown')
              current_files.add(file)
              if os.path.exists(file):
                  current_secrets.append(finding)

          for finding in history_data:
              file = finding.get('File', 'Unknown')
              if file not in current_files or not os.path.exists(file):
                  historical_secrets.append(finding)

          print("## 🚨 Secrets Detected")
          print("")

          if current_secrets:
              print(f"### ⛔ Current Commit: {len(current_secrets)} secret(s) - BUILD BLOCKED")
              print("")
              print("**These secrets are in your current changes and must be fixed:**")
              print("")

              for i, finding in enumerate(current_secrets, 1):
                  file = finding.get('File', 'Unknown')
                  line = finding.get('StartLine', 'Unknown')
                  rule = finding.get('RuleID', 'Unknown')
                  match = finding.get('Match', '')
                  secret = finding.get('Secret', '')

                  if secret and len(secret) > 8:
                      masked = secret[:4] + '*' * (len(secret) - 8) + secret[-4:]
                  else:
                      masked = '*' * len(secret) if secret else 'N/A'

                  print(f"**{i}. {rule}**")
                  print(f"- **Location**: `{file}` (line {line})")

                  if repo and sha and file != 'Unknown':
                      file_url = f"https://github.com/{repo}/blob/{sha}/{file}#L{line}"
                      print(f"- **View file**: [{file}:{line}]({file_url})")

                  print(f"- **Match**: `{match[:100]}...`" if len(match) > 100 else f"- **Match**: `{match}`")
                  print(f"- **Secret**: `{masked}`")
                  print("")

          if historical_secrets:
              print("")
              print("---")
              print("")
              print(f"### ⚠️ Git History: {len(historical_secrets)} secret(s) found - WARNING ONLY")
              print("")
              print("<details><summary>Click to view historical secrets</summary>")
              print("")

              for i, finding in enumerate(historical_secrets[:20], 1):
                  file = finding.get('File', 'Unknown')
                  line = finding.get('StartLine', 'Unknown')
                  rule = finding.get('RuleID', 'Unknown')
                  secret = finding.get('Secret', '')
                  commit = finding.get('Commit', '')

                  if secret and len(secret) > 8:
                      masked = secret[:4] + '*' * (len(secret) - 8) + secret[-4:]
                  else:
                      masked = '*' * len(secret) if secret else 'N/A'

                  print(f"**{i}. {rule}**")
                  print(f"- **Location**: `{file}` (line {line})")
                  if commit:
                      print(f"- **Commit**: `{commit[:8]}`")
                  print(f"- **Secret**: `{masked}`")
                  print("")

              if len(historical_secrets) > 20:
                  print(f"*...and {len(historical_secrets) - 20} more historical secret(s)*")

              print("</details>")
              print("")
              print("💡 **Recommendation**: These secrets should be rotated if they were real credentials.")

          print("")
          print("---")
          print("")
          print("## 🔧 How to Fix")
          print("")
          print("- Use environment variables: `process.env.MY_SECRET`")
          print("- Use placeholder values: `'your-api-key-here'`")
          print("- Create `.env.example` with safe defaults")
          print("")

          EOF

          exit 1

  security:
    name: Security Scan
    # Skip CodeQL on staging-bound PRs: same code already scanned on the
    # upstream sandbox PR. Staging is a promotion gate, not a new-code gate.
    if: github.base_ref != 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          output: sarif-results
          upload: false
        continue-on-error: true

      - name: Parse and report security results
        if: always()
        run: |
          SARIF_FILE=$(find sarif-results -name "*.sarif" -type f | head -n 1)

          if [ -z "$SARIF_FILE" ]; then
            echo "## ✅ Security Scan Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No SARIF results file found. CodeQL analysis may still be processing." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          import os
          import glob
          import sys

          sarif_files = glob.glob('sarif-results/**/*.sarif', recursive=True)
          if not sarif_files:
              print("## ✅ Security Scan Complete")
              print("")
              print("No security issues detected by CodeQL.")
              sys.exit(0)

          sarif_file = sarif_files[0]

          try:
              with open(sarif_file, 'r') as f:
                  sarif = json.load(f)

              all_results = []

              for run in sarif.get('runs', []):
                  results = run.get('results', [])
                  rules = {r['id']: r for r in run.get('tool', {}).get('driver', {}).get('rules', [])}

                  for result in results:
                      rule_id = result.get('ruleId', 'Unknown')
                      rule = rules.get(rule_id, {})

                      level = result.get('level', 'warning')
                      message = result.get('message', {}).get('text', 'No description')

                      properties = result.get('properties', {})
                      security_severity = properties.get('security-severity', '')
                      kind = properties.get('kind', '')
                      precision = properties.get('precision', '')
                      tags = properties.get('tags', [])

                      if not security_severity and rule:
                          rule_properties = rule.get('properties', {})
                          security_severity = rule_properties.get('security-severity', '')
                          if not tags:
                              tags = rule_properties.get('tags', [])

                      if security_severity:
                          try:
                              score = float(security_severity)
                              if score >= 9.0:
                                  severity_label = 'Critical'
                              elif score >= 7.0:
                                  severity_label = 'High'
                              elif score >= 4.0:
                                  severity_label = 'Medium'
                              else:
                                  severity_label = 'Low'
                          except:
                              severity_label = 'Unknown'
                      else:
                          has_security_tag = any('security' in str(t).lower() for t in tags)
                          has_external_tag = any('external' in str(t).lower() for t in tags)
                          if level == 'error':
                              severity_label = 'High'
                          elif level == 'warning':
                              if has_security_tag or 'security' in kind.lower() or 'path-problem' in kind.lower():
                                  severity_label = 'High' if precision in ['high', 'very-high'] or has_external_tag else 'Medium'
                              else:
                                  severity_label = 'Medium'
                          elif level == 'note':
                              severity_label = 'Low'
                          else:
                              severity_label = 'Unknown'

                      locations = result.get('locations', [])
                      if locations:
                          loc = locations[0].get('physicalLocation', {})
                          file = loc.get('artifactLocation', {}).get('uri', 'Unknown')
                          region = loc.get('region', {})
                          line = region.get('startLine', 'Unknown')
                      else:
                          file = 'Unknown'
                          line = 'Unknown'

                      fix_recommendation = None
                      rule_help_uri = None
                      if rule:
                          rule_help_uri = rule.get('helpUri', '')
                          help_text = rule.get('help', {})
                          if isinstance(help_text, dict):
                              fix_recommendation = help_text.get('text', '')
                          elif isinstance(help_text, str):
                              fix_recommendation = help_text
                          if not fix_recommendation:
                              full_desc = rule.get('fullDescription', {})
                              if isinstance(full_desc, dict):
                                  fix_recommendation = full_desc.get('text', '')

                      all_results.append({
                          'rule_id': rule_id,
                          'severity': severity_label,
                          'message': message,
                          'file': file,
                          'line': line,
                          'rule_name': rule.get('shortDescription', {}).get('text', rule_id),
                          'fix': fix_recommendation,
                          'help_uri': rule_help_uri
                      })

              if not all_results:
                  print("## ✅ Security Scan Complete")
                  print("")
                  print("No security issues detected by CodeQL.")
              else:
                  critical = [r for r in all_results if r['severity'] == 'Critical']
                  high = [r for r in all_results if r['severity'] == 'High']
                  medium = [r for r in all_results if r['severity'] == 'Medium']
                  low = [r for r in all_results if r['severity'] == 'Low']

                  repo = os.environ.get('GITHUB_REPOSITORY', '')
                  sha = os.environ.get('GITHUB_SHA', '')

                  priority_issues = critical + high
                  if priority_issues:
                      print("## ⚠️ Security Issues Found - BUILD BLOCKED")
                  else:
                      print("## ⚠️ Security Issues Found")

                  print("")
                  print(f"CodeQL detected **{len(all_results)} potential security issue(s)**:")
                  print("")
                  if critical:
                      print(f"- 🔴 **{len(critical)} Critical**")
                  if high:
                      print(f"- 🟠 **{len(high)} High**")
                  if medium:
                      print(f"- 🟡 **{len(medium)} Medium**")
                  if low:
                      print(f"- 🟢 **{len(low)} Low**")
                  print("")

                  print("<details><summary>View all issue(s)</summary>")
                  print("")

                  for i, issue in enumerate(all_results, 1):
                      emoji = {'Critical': '🔴', 'High': '🟠', 'Medium': '🟡', 'Low': '🟢'}.get(issue['severity'], '⚪')
                      print(f"**{i}. {emoji} {issue['severity']}: {issue['rule_name']}**")
                      print(f"- **File**: `{issue['file']}` (line {issue['line']})")
                      if repo and sha and issue['file'] != 'Unknown':
                          file_url = f"https://github.com/{repo}/blob/{sha}/{issue['file']}#L{issue['line']}"
                          print(f"- **View code**: [{issue['file']}:{issue['line']}]({file_url})")
                      print(f"- **Issue**: {issue['message'][:200]}{'...' if len(issue['message']) > 200 else ''}")
                      if issue['fix']:
                          fix_text = issue['fix'].split('.')[0] if '.' in issue['fix'] else issue['fix'][:200]
                          print(f"- **Recommended fix**: {fix_text}")
                      elif issue['help_uri']:
                          print(f"- **Learn more**: [View documentation]({issue['help_uri']})")
                      print("")

                  print("</details>")
                  print("")

                  if priority_issues:
                      print("**⛔ Build blocked**: Critical or High severity issues must be fixed before merging.")
                  else:
                      print("**Note**: Medium and Low severity issues won't block your build, but please review and fix them.")

              # Only fail on Critical/High
              critical = [r for r in all_results if r['severity'] == 'Critical']
              high = [r for r in all_results if r['severity'] == 'High']
              if critical or high:
                  sys.exit(1)

          except Exception as e:
              print("## ⚠️ Security Scan Complete")
              print("")
              print(f"Could not parse SARIF results: {e}")
              print("")
              print("**View details**: Go to the Security tab → Code scanning alerts")

          EOF

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          # Full history so nx-set-shas can find the last successful CI run on
          # the PR's base branch and nx affected can diff against it.
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Restore nx cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .nx/cache
          # Job-specific key so the test and build jobs don't collide on save
          # (shared key → second job's save is a no-op → lost cache next run).
          key: nx-${{ runner.os }}-test-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-test-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-test-

      - name: Derive affected base/head
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4.4.0
        with:
          main-branch-name: ${{ github.base_ref }}

      - name: Run affected tests
        id: test
        run: |
          pnpm exec nx affected -t test --nxBail=false 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Report test results
        if: steps.test.outcome == 'failure'
        run: |
          echo "## ❌ Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View test failures</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -100 test-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pnpm exec nx affected -t test" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    # Decoupled from typecheck/test/security: runs in parallel as its own
    # required check. CodeQL no longer gates here — it runs nightly (codeql.yml).
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Restore nx cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .nx/cache
          # Job-specific key so the test and build jobs don't collide on save
          # (shared key → second job's save is a no-op → lost cache next run).
          key: nx-${{ runner.os }}-build-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-build-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-build-

      - name: Derive affected base/head
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4.4.0
        with:
          main-branch-name: ${{ github.base_ref }}

      - name: Build affected packages
        id: build
        run: |
          pnpm exec nx affected -t build --nxBail=false 2>&1 | tee build-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Report build results
        if: steps.build.outcome == 'failure'
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View build errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -100 build-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pnpm exec nx affected -t build" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  validate-recipes:
    name: Validate Recipes
    # Skip recipe validation on staging-bound PRs: recipes don't change in
    # promotion-only flow. Sandbox/dev PRs (where recipes are actually edited)
    # remain gated.
    if: github.base_ref != 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Validate recipe files
        run: pnpm validate-recipes

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Restore nx cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .nx/cache
          # Job-specific key so lint/test/build don't collide on cache save.
          key: nx-${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-lint-

      - name: Derive affected base/head
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
        with:
          main-branch-name: ${{ github.base_ref }}

      - name: Lint affected projects
        id: lint
        run: |
          pnpm exec nx affected -t lint --nxBail=false 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Report lint results
        if: steps.lint.outcome == 'failure'
        run: |
          echo "## ❌ Lint Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View lint errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -100 lint-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pnpm exec nx affected -t lint" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  docker-build:
    # Build every Dockerfile in the repo on every PR. Catches refactors that
    # orphan a `COPY` path (the class of bug that broke sandbox CD after
    # commit a8d25528 deleted apps/form_builder/app/server/ai-builder/prompts
    # while the form_builder_api Dockerfile still referenced it).
    #
    # `push: false` — no ECR push, just validate the build context. Faster
    # than full deploy since we don't run the image, just compile it.
    # GHA layer cache scoped per Dockerfile so a change to one doesn't bust
    # the others.
    name: Docker Build (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: api
            dockerfile: apps/api/Dockerfile
          - label: form-builder-api
            dockerfile: apps/form_builder_api/Dockerfile
          - label: chat-ingest
            dockerfile: apps/chat/Dockerfile.ingest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build ${{ matrix.label }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=ci-${{ matrix.label }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.label }}
