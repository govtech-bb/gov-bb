name: CI

on:
  pull_request:
    branches: [sandbox, dev]
  workflow_dispatch:

permissions:
  contents: read

# Latest push to a PR wins — cancel superseded in-progress runs. Safe because
# CI has no side effects (pull_request / workflow_dispatch only, no deploys).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Run type check (tsc --build)
        id: typecheck
        run: |
          pnpm exec tsc -b 2>&1 | tee typecheck-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Report type check results
        if: steps.typecheck.outcome == 'failure'
        run: |
          ERROR_COUNT=$(grep -c "error TS" typecheck-output.txt 2>/dev/null || echo "?")

          echo "## ❌ Type Check Failed — ${ERROR_COUNT} error(s)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View type errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat typecheck-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pnpm exec tsc -b" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan current commit for secrets
        id: gitleaks_current
        run: |
          gitleaks detect --source . --verbose --config .gitleaks.toml --report-format json --report-path gitleaks-current.json 2>&1 | tee gitleaks-current-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Fetch full history and scan if secrets found
        id: gitleaks_history
        if: steps.gitleaks_current.outcome == 'failure'
        run: |
          echo "Secrets found in current commit. Checking git history for similar secrets..."
          git fetch --unshallow || git fetch --depth=1000
          gitleaks detect --source . --verbose --config .gitleaks.toml --report-format json --report-path gitleaks-history.json 2>&1 | tee gitleaks-history-output.txt || true
        continue-on-error: true

      - name: Analyze and report secrets
        if: steps.gitleaks_current.outcome == 'failure'
        run: |
          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          import os

          repo = os.environ.get('GITHUB_REPOSITORY', '')
          sha = os.environ.get('GITHUB_SHA', '')

          try:
              with open('gitleaks-current.json', 'r') as f:
                  current_data = json.load(f)
          except:
              current_data = []

          try:
              with open('gitleaks-history.json', 'r') as f:
                  history_data = json.load(f)
          except:
              history_data = []

          current_secrets = []
          historical_secrets = []

          current_files = set()
          for finding in current_data:
              file = finding.get('File', 'Unknown')
              current_files.add(file)
              if os.path.exists(file):
                  current_secrets.append(finding)

          for finding in history_data:
              file = finding.get('File', 'Unknown')
              if file not in current_files or not os.path.exists(file):
                  historical_secrets.append(finding)

          print("## 🚨 Secrets Detected")
          print("")

          if current_secrets:
              print(f"### ⛔ Current Commit: {len(current_secrets)} secret(s) - BUILD BLOCKED")
              print("")
              print("**These secrets are in your current changes and must be fixed:**")
              print("")

              for i, finding in enumerate(current_secrets, 1):
                  file = finding.get('File', 'Unknown')
                  line = finding.get('StartLine', 'Unknown')
                  rule = finding.get('RuleID', 'Unknown')
                  match = finding.get('Match', '')
                  secret = finding.get('Secret', '')

                  if secret and len(secret) > 8:
                      masked = secret[:4] + '*' * (len(secret) - 8) + secret[-4:]
                  else:
                      masked = '*' * len(secret) if secret else 'N/A'

                  print(f"**{i}. {rule}**")
                  print(f"- **Location**: `{file}` (line {line})")

                  if repo and sha and file != 'Unknown':
                      file_url = f"https://github.com/{repo}/blob/{sha}/{file}#L{line}"
                      print(f"- **View file**: [{file}:{line}]({file_url})")

                  print(f"- **Match**: `{match[:100]}...`" if len(match) > 100 else f"- **Match**: `{match}`")
                  print(f"- **Secret**: `{masked}`")
                  print("")

          if historical_secrets:
              print("")
              print("---")
              print("")
              print(f"### ⚠️ Git History: {len(historical_secrets)} secret(s) found - WARNING ONLY")
              print("")
              print("<details><summary>Click to view historical secrets</summary>")
              print("")

              for i, finding in enumerate(historical_secrets[:20], 1):
                  file = finding.get('File', 'Unknown')
                  line = finding.get('StartLine', 'Unknown')
                  rule = finding.get('RuleID', 'Unknown')
                  secret = finding.get('Secret', '')
                  commit = finding.get('Commit', '')

                  if secret and len(secret) > 8:
                      masked = secret[:4] + '*' * (len(secret) - 8) + secret[-4:]
                  else:
                      masked = '*' * len(secret) if secret else 'N/A'

                  print(f"**{i}. {rule}**")
                  print(f"- **Location**: `{file}` (line {line})")
                  if commit:
                      print(f"- **Commit**: `{commit[:8]}`")
                  print(f"- **Secret**: `{masked}`")
                  print("")

              if len(historical_secrets) > 20:
                  print(f"*...and {len(historical_secrets) - 20} more historical secret(s)*")

              print("</details>")
              print("")
              print("💡 **Recommendation**: These secrets should be rotated if they were real credentials.")

          print("")
          print("---")
          print("")
          print("## 🔧 How to Fix")
          print("")
          print("- Use environment variables: `process.env.MY_SECRET`")
          print("- Use placeholder values: `'your-api-key-here'`")
          print("- Create `.env.example` with safe defaults")
          print("")

          EOF

          exit 1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so nx-set-shas can find the last successful CI run on
          # the PR's base branch and nx affected can diff against it.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Restore nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          # Job-specific key so the test and build jobs don't collide on save
          # (shared key → second job's save is a no-op → lost cache next run).
          key: nx-${{ runner.os }}-test-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-test-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-test-

      - name: Derive affected base/head
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: ${{ github.base_ref }}

      - name: Run affected tests
        id: test
        run: |
          pnpm exec nx affected -t test --nxBail=false 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Report test results
        if: steps.test.outcome == 'failure'
        run: |
          echo "## ❌ Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View test failures</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -100 test-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pnpm exec nx affected -t test" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    # Decoupled from typecheck/test/security: runs in parallel as its own
    # required check. CodeQL no longer gates here — it runs nightly (codeql.yml).
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Restore nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          # Job-specific key so the test and build jobs don't collide on save
          # (shared key → second job's save is a no-op → lost cache next run).
          key: nx-${{ runner.os }}-build-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-build-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-build-

      - name: Derive affected base/head
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: ${{ github.base_ref }}

      - name: Build affected packages
        id: build
        run: |
          pnpm exec nx affected -t build --nxBail=false 2>&1 | tee build-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Report build results
        if: steps.build.outcome == 'failure'
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>View build errors</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -100 build-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix it locally:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pnpm exec nx affected -t build" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1

  validate-recipes:
    name: Validate Recipes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Validate recipe files
        run: pnpm validate-recipes
