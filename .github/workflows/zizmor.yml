name: GitHub Actions Security Analysis

on:
  push:
    branches: [sandbox]
  pull_request:
    branches: ['**']

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Enforce exact action version comments
        # A SHA pin commented with a moving major alias (# v4) drifts out of
        # sync when the vendor advances that tag, failing zizmor's online
        # ref-version-mismatch audit on a later, unrelated PR. Require the
        # exact release tag (# v4.36.2) so the pin is stable. See CLAUDE.md.
        run: |
          if grep -rnE 'uses:.*@[0-9a-f]{40} # v[0-9]+$' .github/workflows/; then
            echo "::error::Above pins use a moving major-alias comment (# vN). Use the exact release tag (e.g. # v4.36.2); resolve with 'git ls-remote --tags <repo>'."
            exit 1
          fi
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Pin the zizmor engine so a new release can't introduce a surprise
          # audit failure on an unrelated PR. Bump deliberately.
          version: v1.26.1
          advanced-security: false
          annotations: true
          # Block on low-severity findings and above. Informational findings
          # (e.g. template-injection from trusted step/needs outputs) are
          # advisory and don't fail the build.
          min-severity: low
