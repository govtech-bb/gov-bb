name: Workflow Security (zizmor)

# Static analysis of the GitHub Actions workflows themselves — catches
# template injection, unpinned actions, credential persistence, and
# over-broad permissions before they land. https://docs.zizmor.sh

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Fail the job on any finding at medium or above; no GH Advanced
          # Security needed — plain check output, not SARIF upload.
          advanced-security: false
          min-severity: medium
          persona: regular
