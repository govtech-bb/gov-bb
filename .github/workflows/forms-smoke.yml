name: Forms Live Smoke

# Reusable workflow: drives ONE live smoke spec against a deployed forms URL.
#
# It is called (via `uses:`) from the workflows that have a deployed URL to
# point at — job-level `needs:` only resolves within a single workflow file, so
# the callers keep their dependency edge (deploy-sandbox's smoke jobs
# `needs: amplify-forms`; pr-preview's smoke job `needs: preview-forms`) while
# the steps below live in one place. See ADR 0027 (post-deploy smoke) and ADR
# 0029 (per-PR preview smoke).
#
# No AWS credentials: it drives a headless browser against the public deployed
# URL, and any uploads use presigned URLs the deployed API issues server-side.
# The spec SUBMITS FOR REAL, so a green run files a real submission row in the
# target environment. Processors (email/webhook/payment) are DROPPED for these
# submissions when SMOKE_SUBMISSION_TOKEN is set on both this workflow and the
# API — so a configured run sends no real emails/webhooks (#1252). If the token
# is unset the submission still persists AND its processors fire for real
# (recipient testing@govtech.bb).

on:
  workflow_call:
    inputs:
      base_url:
        description: "Deployed forms URL the smoke spec runs against (SMOKE_BASE_URL)."
        required: true
        type: string
      spec:
        description: "The *.smoke.spec.ts filename under apps/forms/e2e/smoke to run."
        required: true
        type: string
      artifact_name:
        description: "Name for the Playwright trace artifact uploaded on failure."
        required: true
        type: string
    secrets:
      smoke_submission_token:
        description: >
          Token sent as the X-Smoke-Submission header so the API drops all
          processors for these submissions (no real emails/webhooks). Must
          match the API's SMOKE_SUBMISSION_TOKEN. Optional — if absent the
          header is empty and the API fires processors as normal (#1252).
        required: false

jobs:
  smoke:
    name: Smoke (${{ inputs.spec }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        run: pnpm --filter @govtech-bb/forms exec playwright install --with-deps chromium
      - name: Run live smoke spec
        env:
          # Both via env (not inline ${{ }}) so nothing is interpolated into the
          # shell. base_url in particular traces back to the PR branch name on
          # the preview caller, so it must never reach the script directly.
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          SMOKE_SPEC: ${{ inputs.spec }}
          # Drops all processors server-side for these submissions (no real
          # emails/webhooks). Empty when the secret is unset → API ignores it.
          SMOKE_SUBMISSION_TOKEN: ${{ secrets.smoke_submission_token }}
        # Run only the one spec (not the whole e2e/smoke dir). Override the
        # config's retries: 0 with 2 retries here to absorb post-deploy edge
        # cache / network flakiness without masking a genuine failure.
        run: >
          pnpm --filter @govtech-bb/forms exec playwright test
          --config playwright.smoke.config.ts
          "$SMOKE_SPEC"
          --retries=2
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}
          path: apps/forms/test-results/
          retention-days: 7
