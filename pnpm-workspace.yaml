packages:
  - "apps/*"
  - "packages/*"

# was .npmrc node-linker=hoisted; lives here so npm stops warning
# about unknown config — see docs/decisions/0002
nodeLinker: hoisted

# pnpm 11 supply-chain hardening: no git/URL deps in the transitive graph.
# NOTE: trustPolicy no-downgrade was tried and reverted — it blocks
# @govtech-bb/design and @govtech-bb/react@1.0.0-alpha.16, which were
# published without provenance attestation (earlier versions had it).
# Re-enable once the design-system publish pipeline attests again.
blockExoticSubdeps: true

# pnpm 11 prompts before purging node_modules; non-TTY contexts (Docker
# image builds, Amplify) abort instead of prompting. Restore v10 behavior.
confirmModulesPurge: false

# Security overrides, mostly for transitive deps flagged by dependabot.
# Lived in package.json "pnpm.overrides" until pnpm 11 stopped reading it.
overrides:
  multer@<2.2.0: ^2.2.0
  uuid@<11.1.1: ^11.1.1
  js-yaml@>=4.0.0 <4.1.2: ^4.1.2
  tmp@<0.2.7: ^0.2.7
  form-data@<4.0.6: ^4.0.6
  "@opentelemetry/core@<2.8.0": ^2.8.0
  esbuild@<0.28.1: ^0.28.1

# pnpm blocks dependency build scripts by default; allowBuilds is the
# reviewed decision list. true = must run (fetch/verify native binaries).
# false = consciously blocked: telemetry/analytics postinstalls (@scarf,
# nestjs, protobufjs) or native modules with a working JS/WASM fallback
# (nx, unrs-resolver). A new dep with a build script stays blocked until
# reviewed and sorted here.
allowBuilds:
  "@swc/core": true
  esbuild: true
  sharp: true
  "@nestjs/core": false
  "@scarf/scarf": false
  nx: false
  protobufjs: false
  unrs-resolver: false

catalog:
  "@tanstack/ai": "^0.39.0"
  "@tanstack/ai-bedrock": "^0.1.0"
  "@tanstack/ai-react": "^0.16.1"
  "@tanstack/devtools-vite": "^0.7.0"
  "@tanstack/react-devtools": "^0.10.5"
  "@tanstack/react-form": "^1.29.0"
  "@tanstack/react-query": "^5.100.11"
  "@tanstack/react-query-devtools": "^5.100.11"
  "@tanstack/react-router": "^1.170.9"
  "@tanstack/react-router-devtools": "^1.167.0"
  "@tanstack/react-router-ssr-query": "^1.167.0"
  "@tanstack/react-start": "^1.168.16"
  "@tanstack/react-virtual": "^3.13.26"
  "@tanstack/router-plugin": "^1.167.22"
  "@types/react": "^19.2.15"
  "@types/react-dom": "^19.2.3"
  react: "^19.2.6"
  react-dom: "^19.2.6"
  typescript: "^5.9.3"
  vite: "^8.0.14"

minimumReleaseAgeExclude:
  - esbuild@0.28.1
  - tmp@0.2.7
  - form-data@4.0.6
  - js-yaml@4.1.2
  - '@opentelemetry/core@2.8.0'
  - multer@2.2.0
  - undici@7.28.0
  - nodemailer@9.0.1
  - '@govtech-bb/design@1.0.0-alpha.17'
  - '@govtech-bb/react@1.0.0-alpha.17'
  - '@govtech-bb/styles@1.0.0-alpha.17'
  - '@tanstack/ai-client@0.19.1'
  - '@tanstack/ai-react@0.16.1'
  - '@tanstack/ai@0.39.0'
  - '@tanstack/ai-bedrock@0.1.0'
  - '@tanstack/openai-base@0.9.6'
