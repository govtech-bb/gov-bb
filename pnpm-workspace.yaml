packages:
  - "apps/*"
  - "packages/*"

# was .npmrc node-linker=hoisted; lives here so npm stops warning
# about unknown config — see docs/decisions/0002
nodeLinker: hoisted

# pnpm 10 blocks dependency build scripts by default. onlyBuiltDependencies
# is the allowlist — these fetch/verify real native binaries and must run.
# A new dep with a build script stays blocked until reviewed and sorted here.
onlyBuiltDependencies:
  - esbuild
  - sharp

# Consciously NOT built — telemetry/analytics postinstalls (@scarf, nestjs,
# protobufjs) or native modules with a working JS/WASM fallback (nx,
# unrs-resolver). Listed so the decision is reviewed, not silently ignored.
ignoredBuiltDependencies:
  - "@nestjs/core"
  - "@scarf/scarf"
  - nx
  - protobufjs
  - unrs-resolver

catalog:
  "@tanstack/ai": "^0.28.0"
  "@tanstack/ai-react": "^0.15.4"
  "@tanstack/devtools-vite": "^0.7.0"
  "@tanstack/react-devtools": "^0.10.5"
  "@tanstack/react-form": "^1.29.0"
  "@tanstack/react-query": "^5.100.11"
  "@tanstack/react-query-devtools": "^5.100.11"
  "@tanstack/react-router": "^1.170.9"
  "@tanstack/react-router-devtools": "^1.167.0"
  "@tanstack/react-router-ssr-query": "^1.167.0"
  "@tanstack/react-start": "^1.168.16"
  "@tanstack/react-virtual": "^3.13.26"
  "@tanstack/router-plugin": "^1.167.22"
  "@types/react": "^19.2.15"
  "@types/react-dom": "^19.2.3"
  react: "^19.2.6"
  react-dom: "^19.2.6"
  typescript: "^5.9.3"
