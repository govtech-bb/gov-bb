version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --ignore-scripts
    build:
      commands:
        - npx nx run form-types:build
        - npx nx run form-conditions:build
        - npx nx run web:build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .nx/cache/**/*