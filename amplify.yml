version: 1
applications:
  - appRoot: apps/forms
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.30.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm exec nx run form-types:build
            - pnpm exec nx run form-conditions:build
            - pnpm exec nx run forms:build
      artifacts:
        baseDirectory: apps/forms/dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: "Strict-Transport-Security"
              value: "max-age=63072000; includeSubDomains; preload"
            - key: "X-Content-Type-Options"
              value: "nosniff"
            - key: "Referrer-Policy"
              value: "strict-origin-when-cross-origin"
            - key: "X-Frame-Options"
              value: "DENY"
            - key: "Permissions-Policy"
              value: "camera=(), microphone=(), geolocation=(), payment=()"
            - key: "Content-Security-Policy"
              value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

  - appRoot: apps/landing
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.30.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm exec nx run landing:build
        postBuild:
          commands:
            # Restructure Tanstack Start output for Amplify WEB_COMPUTE
            - mkdir -p .amplify-hosting/compute/default
            - mkdir -p .amplify-hosting/static
            - cp -r dist/server/* .amplify-hosting/compute/default/
            - cp -r dist/client/* .amplify-hosting/static/ 2>/dev/null || true
            - cp apps/landing/deploy-manifest.json .amplify-hosting/deploy-manifest.json
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
