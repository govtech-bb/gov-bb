version: 1
applications:
  - appRoot: apps/forms
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install --ignore-scripts
        build:
          commands:
            - npx nx run form-types:build
            - npx nx run form-conditions:build
            - npx nx run forms:build
      artifacts:
        baseDirectory: apps/forms/dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*