version: 1
applications:
  - appRoot: apps/landing
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use $(cat .nvmrc) || nvm install $(cat .nvmrc)
            - npm install -g pnpm@11.6.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm exec nx run landing:build
      artifacts:
        baseDirectory: apps/landing/.amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: "Strict-Transport-Security"
              value: "max-age=63072000; includeSubDomains; preload"
            - key: "X-Content-Type-Options"
              value: "nosniff"
            - key: "Referrer-Policy"
              value: "strict-origin-when-cross-origin"
            # frame-ancestors allows the form_builder's /content live preview to
            # embed this app (modern browsers ignore X-Frame-Options when
            # frame-ancestors is present; DENY stays as the legacy fallback).
            - key: "X-Frame-Options"
              value: "DENY"
            - key: "Permissions-Policy"
              value: "camera=(), microphone=(), geolocation=(), payment=()"
            # script-src includes https://cloud.umami.is so the Umami Cloud
            # analytics script loads. Without it the browser blocks the fetch
            # and the script tag (rendered from VITE_UMAMI_WEBSITE_ID) never
            # executes — see issue #1364 follow-up.
            - key: "Content-Security-Policy"
              value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cloud.umami.is; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; frame-ancestors https://*.alpha.gov.bb; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
  - appRoot: apps/chat
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use $(cat .nvmrc) || nvm install $(cat .nvmrc)
            - npm install -g pnpm@11.6.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm exec nx run chat:build
      artifacts:
        baseDirectory: apps/chat/.amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: "Strict-Transport-Security"
              value: "max-age=63072000; includeSubDomains; preload"
            - key: "X-Content-Type-Options"
              value: "nosniff"
            - key: "Referrer-Policy"
              value: "strict-origin-when-cross-origin"
            - key: "X-Frame-Options"
              value: "DENY"
            - key: "Permissions-Policy"
              value: "camera=(), microphone=(), geolocation=(), payment=()"
            - key: "Content-Security-Policy"
              value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
  - appRoot: apps/forms
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use $(cat .nvmrc) || nvm install $(cat .nvmrc)
            - npm install -g pnpm@11.6.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm exec nx run form-types:build
            - pnpm exec nx run form-conditions:build
            - pnpm exec nx run forms:build
      artifacts:
        baseDirectory: apps/forms/dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: "Strict-Transport-Security"
              value: "max-age=63072000; includeSubDomains; preload"
            - key: "X-Content-Type-Options"
              value: "nosniff"
            - key: "Referrer-Policy"
              value: "strict-origin-when-cross-origin"
            - key: "X-Frame-Options"
              value: "DENY"
            - key: "Permissions-Policy"
              value: "camera=(), microphone=(), geolocation=(), payment=()"
            # script-src includes https://cloud.umami.is so the Umami Cloud
            # analytics script loads. Without it the browser blocks the fetch
            # and the script tag (rendered from VITE_UMAMI_WEBSITE_ID) never
            # executes — see issue #1364 follow-up.
            - key: "Content-Security-Policy"
              value: "default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
  - appRoot: apps/form_builder
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use $(cat .nvmrc) || nvm install $(cat .nvmrc)
            - npm install -g pnpm@11.6.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm exec nx run form-builder-app:build
      artifacts:
        baseDirectory: apps/form_builder/.amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: "Strict-Transport-Security"
              value: "max-age=63072000; includeSubDomains; preload"
            - key: "X-Content-Type-Options"
              value: "nosniff"
            - key: "Referrer-Policy"
              value: "strict-origin-when-cross-origin"
            - key: "X-Frame-Options"
              value: "DENY"
            - key: "Permissions-Policy"
              value: "camera=(), microphone=(), geolocation=(), payment=()"
            # frame-src allows the /content editor's live preview iframe of the
            # landing app's /preview-start-page route.
            - key: "Content-Security-Policy"
              value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.github.com https://github.com https://*.s3.ca-central-1.amazonaws.com; frame-src 'self' https://*.alpha.gov.bb; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://github.com; object-src 'none'; upgrade-insecure-requests"
  - appRoot: apps/feature_flagging
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use $(cat .nvmrc) || nvm install $(cat .nvmrc)
            - npm install -g pnpm@11.6.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm exec nx run feature-flagging-app:build
      artifacts:
        baseDirectory: apps/feature_flagging/.amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: "Strict-Transport-Security"
              value: "max-age=63072000; includeSubDomains; preload"
            - key: "X-Content-Type-Options"
              value: "nosniff"
            - key: "Referrer-Policy"
              value: "strict-origin-when-cross-origin"
            - key: "X-Frame-Options"
              value: "DENY"
            - key: "Permissions-Policy"
              value: "camera=(), microphone=(), geolocation=(), payment=()"
            # No iframes and no third-party browser calls: the SSR server talks
            # to the forms API and GitHub; the browser only hits same-origin
            # server functions. GitHub hosts are allowed for the OAuth redirect.
            - key: "Content-Security-Policy"
              value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.github.com https://github.com; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://github.com; object-src 'none'; upgrade-insecure-requests"
  - appRoot: apps/analytics
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use $(cat .nvmrc) || nvm install $(cat .nvmrc)
            - npm install -g pnpm@11.6.0
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm exec nx run analytics-app:build
      artifacts:
        baseDirectory: apps/analytics/.amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: "Strict-Transport-Security"
              value: "max-age=63072000; includeSubDomains; preload"
            - key: "X-Content-Type-Options"
              value: "nosniff"
            - key: "Referrer-Policy"
              value: "strict-origin-when-cross-origin"
            - key: "X-Frame-Options"
              value: "DENY"
            - key: "Permissions-Policy"
              value: "camera=(), microphone=(), geolocation=(), payment=()"
            - key: "Content-Security-Policy"
              value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
