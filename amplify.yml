version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.33.4
            - pnpm install --frozen-lockfile --ignore-scripts
        build:
          commands:
            - pnpm exec nx run form-types:build
            - pnpm exec nx run form-conditions:build
            - pnpm exec nx run web:build
      artifacts:
        baseDirectory: apps/web/dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*
