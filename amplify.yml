version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install --ignore-scripts
        build:
          commands:
            - npx nx run form-types:build
            - npx nx run form-conditions:build
            - cd apps/web && npx vite build && cd ../..
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .nx/cache/**/*