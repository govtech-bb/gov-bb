<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 1250" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#c0392b"/>
    </marker>
    <style>
      .a{fill:#e3f0fc;stroke:#2f6fb0;stroke-width:1.5}
      .b{fill:#e5f6e8;stroke:#3a9d4e;stroke-width:1.5}
      .c{fill:#fdf2dc;stroke:#d69a1e;stroke-width:1.5}
      .n{fill:#f4f4f7;stroke:#555;stroke-width:1.5}
      .x{fill:#efe6f8;stroke:#7a4fa0;stroke-width:1.5}
      .e{fill:#fdeaea;stroke:#c0392b;stroke-width:1.5}
      .g{fill:#eeeeee;stroke:#999;stroke-width:1.5;stroke-dasharray:4 3}
      .sec{fill:#fbeee0;stroke:#c47f2a;stroke-width:1.5}
      .db{fill:#dbeaf7;stroke:#2f6fb0;stroke-width:1.5}
      .cont{fill:#ffffff;stroke:#c9c9d2;stroke-width:1.5}
      .t{font-size:12.5px;fill:#1e1e1e}
      .tb{font-size:12.5px;fill:#1e1e1e;font-weight:bold}
      .sm{font-size:10.5px;fill:#444}
      .mono{font-size:10.5px;fill:#333;font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace}
      .h{font-size:15px;font-weight:bold;fill:#111}
      .ln{stroke:#444;stroke-width:1.6;fill:none}
      .lnr{stroke:#c0392b;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
      .albl{font-size:10.5px;fill:#555}
    </style>
  </defs>

  <!-- Title -->
  <text x="760" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#111">Per-MDA webhook destinations — implementation flow (#1920)</text>
  <text x="760" y="58" text-anchor="middle" font-size="13" fill="#555">Secrets Manager JSON keyed by ministry · injected via ECS task-def secrets at boot · grouping via form_config → mda_contact · fail-loud → DLQ</text>

  <!-- Legend -->
  <g transform="translate(40,78)">
    <rect x="0" y="0" width="16" height="16" class="a"/><text x="22" y="12" class="sm">Session A — ministry key · boot-time JSON loader · resolution</text>
    <rect x="380" y="0" width="16" height="16" class="b"/><text x="402" y="12" class="sm">Session B — processor · recipe migration · lint · delete legacy</text>
    <rect x="780" y="0" width="16" height="16" class="c"/><text x="802" y="12" class="sm">Session C — provisioning · startup audit · docs</text>
    <rect x="1090" y="0" width="16" height="16" class="sec"/><text x="1112" y="12" class="sm">Secrets Manager</text>
    <rect x="1240" y="0" width="16" height="16" class="e"/><text x="1262" y="12" class="sm">Fail-loud → DLQ</text>
    <rect x="1370" y="0" width="16" height="16" class="g"/><text x="1392" y="12" class="sm">Deferred</text>
  </g>

  <!-- ============ CONTAINER 1: RUNTIME DISPATCH ============ -->
  <rect x="30" y="120" width="1460" height="520" rx="10" class="cont"/>
  <text x="48" y="145" class="h">1 · Runtime dispatch (per submission)</text>

  <!-- Flow row A -->
  <rect x="48" y="162" width="150" height="52" rx="6" class="n"/>
  <text x="123" y="184" text-anchor="middle" class="t">Citizen submits</text>
  <text x="123" y="200" text-anchor="middle" class="t">form</text>

  <rect x="238" y="162" width="196" height="52" rx="6" class="n"/>
  <text x="336" y="182" text-anchor="middle" class="t">SQS · SubmissionProcessor</text>
  <text x="336" y="198" text-anchor="middle" class="t">Listener (per-entry #95)</text>

  <rect x="474" y="162" width="176" height="52" rx="6" class="b"/>
  <text x="562" y="184" text-anchor="middle" class="tb">WebhookProcessor</text>
  <text x="562" y="200" text-anchor="middle" class="t">.process(entry)</text>

  <!-- decision diamond -->
  <polygon points="770,150 890,188 770,226 650,188" class="b"/>
  <text x="770" y="182" text-anchor="middle" class="sm">config.mapping set</text>
  <text x="770" y="196" text-anchor="middle" class="sm">AND no endpoint/url?</text>

  <rect x="1000" y="162" width="220" height="52" rx="6" class="n"/>
  <text x="1110" y="182" text-anchor="middle" class="t">Generic webhook —</text>
  <text x="1110" y="198" text-anchor="middle" class="t">endpoint.env envelope (unchanged)</text>

  <line x1="198" y1="188" x2="236" y2="188" class="ln" marker-end="url(#arrow)"/>
  <line x1="434" y1="188" x2="472" y2="188" class="ln" marker-end="url(#arrow)"/>
  <line x1="650" y1="188" x2="652" y2="188" class="ln" marker-end="url(#arrow)"/>
  <line x1="890" y1="188" x2="998" y2="188" class="ln" marker-end="url(#arrow)"/>
  <text x="945" y="180" text-anchor="middle" class="albl">NO</text>

  <!-- Resolution row (Session A) -->
  <text x="770" y="248" text-anchor="middle" class="albl">YES ↓ mapped case-management webhook</text>
  <rect x="48" y="266" width="210" height="56" rx="6" class="a"/>
  <text x="153" y="288" text-anchor="middle" class="tb">resolveWebhook</text>
  <text x="153" y="304" text-anchor="middle" class="t">Destination(formId)</text>

  <rect x="292" y="266" width="196" height="56" rx="6" class="a"/>
  <text x="390" y="288" text-anchor="middle" class="t">form_config</text>
  <text x="390" y="304" text-anchor="middle" class="sm">formId → mdaContactId</text>

  <rect x="522" y="262" width="248" height="64" rx="6" class="a"/>
  <text x="646" y="284" text-anchor="middle" class="t">mda_contact row</text>
  <text x="646" y="300" text-anchor="middle" class="sm">ministry key</text>
  <text x="646" y="314" text-anchor="middle" class="sm">(e.g. "youth")</text>

  <rect x="804" y="258" width="252" height="72" rx="6" class="a"/>
  <text x="930" y="278" text-anchor="middle" class="tb">MDA_WEBHOOK_DESTINATIONS</text>
  <text x="930" y="294" text-anchor="middle" class="sm">[ministry] → { url, secret }</text>
  <text x="930" y="310" text-anchor="middle" class="sm">in-memory JSON, parsed at boot</text>
  <text x="930" y="323" text-anchor="middle" class="albl">← from task-def secrets env (§3)</text>

  <rect x="1088" y="266" width="150" height="56" rx="6" class="n"/>
  <text x="1163" y="290" text-anchor="middle" class="t">{ url, secret }</text>
  <text x="1163" y="306" text-anchor="middle" class="sm">resolved</text>

  <!-- YES elbow diamond -> resolve -->
  <path d="M770,226 L770,244 L153,244 L153,264" class="ln" marker-end="url(#arrow)"/>
  <line x1="258" y1="294" x2="290" y2="294" class="ln" marker-end="url(#arrow)"/>
  <line x1="488" y1="294" x2="520" y2="294" class="ln" marker-end="url(#arrow)"/>
  <line x1="770" y1="294" x2="802" y2="294" class="ln" marker-end="url(#arrow)"/>
  <line x1="1056" y1="294" x2="1086" y2="294" class="ln" marker-end="url(#arrow)"/>

  <!-- Delivery row (Session B) -->
  <rect x="48" y="372" width="232" height="58" rx="6" class="b"/>
  <text x="164" y="394" text-anchor="middle" class="tb">buildMappedCasePayload</text>
  <text x="164" y="410" text-anchor="middle" class="sm">code · programme_code · applicant · form_data</text>

  <rect x="314" y="372" width="190" height="58" rx="6" class="b"/>
  <text x="409" y="396" text-anchor="middle" class="t">assertSafeUrl(url)</text>
  <text x="409" y="412" text-anchor="middle" class="sm">SSRF guard</text>

  <rect x="538" y="372" width="232" height="58" rx="6" class="b"/>
  <text x="654" y="394" text-anchor="middle" class="t">POST url</text>
  <text x="654" y="410" text-anchor="middle" class="sm">header  X-API-Key: secret</text>

  <rect x="804" y="372" width="234" height="58" rx="6" class="x"/>
  <text x="921" y="396" text-anchor="middle" class="tb">MDA Case-Management</text>
  <text x="921" y="412" text-anchor="middle" class="t">System (CMS)</text>

  <!-- resolved -> build (elbow) -->
  <path d="M1163,322 L1163,352 L164,352 L164,370" class="ln" marker-end="url(#arrow)"/>
  <line x1="280" y1="401" x2="312" y2="401" class="ln" marker-end="url(#arrow)"/>
  <line x1="504" y1="401" x2="536" y2="401" class="ln" marker-end="url(#arrow)"/>
  <line x1="770" y1="401" x2="802" y2="401" class="ln" marker-end="url(#arrow)"/>

  <!-- Fail-loud lane -->
  <rect x="804" y="466" width="440" height="62" rx="6" class="e"/>
  <text x="1024" y="488" text-anchor="middle" class="tb">Fail loud — throw</text>
  <text x="1024" y="504" text-anchor="middle" class="sm">WebhookConfigError (resolve miss · unknown ministry key · malformed JSON)</text>
  <text x="1024" y="518" text-anchor="middle" class="sm">WebhookDeliveryError (non-2xx / timeout / network)</text>

  <rect x="1276" y="466" width="200" height="62" rx="6" class="e"/>
  <text x="1376" y="492" text-anchor="middle" class="tb">SQS retry → DLQ</text>
  <text x="1376" y="510" text-anchor="middle" class="sm">visible · redrivable</text>

  <line x1="1244" y1="497" x2="1274" y2="497" class="ln" marker-end="url(#arrow)"/>
  <!-- dotted error edges -->
  <path d="M930,330 L930,462" class="lnr" marker-end="url(#arrowRed)"/>
  <text x="965" y="400" class="albl" fill="#c0392b">resolve miss / bad key</text>
  <path d="M654,430 L654,448 L900,448 L900,464" class="lnr" marker-end="url(#arrowRed)"/>
  <text x="700" y="444" class="albl" fill="#c0392b">delivery failure</text>
  <path d="M921,430 L921,448 L1000,448 L1000,464" class="lnr" marker-end="url(#arrowRed)"/>

  <text x="48" y="566" class="sm">Session B also: migrate every CMS recipe off WEBHOOK_URL_*/SECRET_* → mapped MDA mode (keep the mapping block, drop endpoint/auth env refs); update the recipe lint to accept</text>
  <text x="48" y="584" class="sm">mapping-only recipes; delete legacy apps/api/src/webhooks/ (youth listener/service/codes/extractor/module) + remove WebhooksModule. Recipe changes + deletion ship together.</text>
  <text x="48" y="606" class="sm">Golden-payload byte-compat test per migrated form: new mapped payload == legacy dispatch (deterministic code · programme_code · applicant · hoisted form_data).</text>

  <!-- ============ CONTAINER 2: GROUPING ============ -->
  <rect x="30" y="656" width="1460" height="250" rx="10" class="cont"/>
  <text x="48" y="681" class="h">2 · MDA grouping — many forms → one destination  (CMS destination == email MDA, 1:1)</text>

  <!-- Youth row -->
  <rect x="48" y="700" width="200" height="24" rx="4" class="b"/><text x="148" y="717" text-anchor="middle" class="sm">youth-opportunity-byac</text>
  <rect x="48" y="726" width="200" height="24" rx="4" class="b"/><text x="148" y="743" text-anchor="middle" class="sm">youth-opportunity-ydp</text>
  <rect x="48" y="752" width="200" height="24" rx="4" class="b"/><text x="148" y="769" text-anchor="middle" class="sm">… +16 more youth forms</text>

  <rect x="300" y="714" width="180" height="48" rx="6" class="db"/>
  <text x="390" y="734" text-anchor="middle" class="t">form_config rows</text>
  <text x="390" y="750" text-anchor="middle" class="sm">mdaContactId → Youth</text>

  <rect x="520" y="708" width="230" height="60" rx="6" class="a"/>
  <text x="635" y="729" text-anchor="middle" class="tb">mda_contact: Youth Opportunity</text>
  <text x="635" y="745" text-anchor="middle" class="sm">ministry key: "youth"</text>
  <text x="635" y="759" text-anchor="middle" class="sm">+ mda_email (email channel)</text>

  <rect x="790" y="708" width="250" height="60" rx="6" class="sec"/>
  <text x="915" y="729" text-anchor="middle" class="tb">DESTINATIONS["youth"]</text>
  <text x="915" y="745" text-anchor="middle" class="sm">{ url, secret }</text>
  <text x="915" y="759" text-anchor="middle" class="sm">entry in the JSON secret</text>

  <rect x="1080" y="714" width="180" height="48" rx="6" class="x"/>
  <text x="1170" y="743" text-anchor="middle" class="t">CMS · Youth Opportunity</text>

  <path d="M248,712 L296,730" class="ln"/><path d="M248,738 L296,738" class="ln"/><path d="M248,764 L296,746" class="ln"/>
  <line x1="480" y1="738" x2="518" y2="738" class="ln" marker-end="url(#arrow)"/>
  <line x1="750" y1="738" x2="788" y2="738" class="ln" marker-end="url(#arrow)"/>
  <line x1="1040" y1="738" x2="1078" y2="738" class="ln" marker-end="url(#arrow)"/>

  <!-- MoE row -->
  <rect x="48" y="812" width="200" height="24" rx="4" class="b"/><text x="148" y="829" text-anchor="middle" class="sm">moe-form-a</text>
  <rect x="48" y="838" width="200" height="24" rx="4" class="b"/><text x="148" y="855" text-anchor="middle" class="sm">moe-form-b …</text>

  <rect x="300" y="820" width="180" height="48" rx="6" class="db"/>
  <text x="390" y="840" text-anchor="middle" class="t">form_config rows</text>
  <text x="390" y="856" text-anchor="middle" class="sm">mdaContactId → MoE</text>

  <rect x="520" y="814" width="230" height="60" rx="6" class="a"/>
  <text x="635" y="835" text-anchor="middle" class="tb">mda_contact: Min. of Education</text>
  <text x="635" y="851" text-anchor="middle" class="sm">ministry key: "education"</text>
  <text x="635" y="865" text-anchor="middle" class="sm">+ mda_email (email channel)</text>

  <rect x="790" y="814" width="250" height="60" rx="6" class="sec"/>
  <text x="915" y="835" text-anchor="middle" class="tb">DESTINATIONS["education"]</text>
  <text x="915" y="851" text-anchor="middle" class="sm">{ url, secret }</text>
  <text x="915" y="865" text-anchor="middle" class="sm">entry in the JSON secret</text>

  <rect x="1080" y="820" width="180" height="48" rx="6" class="x"/>
  <text x="1170" y="849" text-anchor="middle" class="t">CMS · Min. of Education</text>

  <path d="M248,824 L296,838" class="ln"/><path d="M248,850 L296,846" class="ln"/>
  <line x1="480" y1="844" x2="518" y2="844" class="ln" marker-end="url(#arrow)"/>
  <line x1="750" y1="844" x2="788" y2="844" class="ln" marker-end="url(#arrow)"/>
  <line x1="1040" y1="844" x2="1078" y2="844" class="ln" marker-end="url(#arrow)"/>

  <text x="1288" y="712" class="sm">One Secrets Manager secret</text>
  <text x="1288" y="728" class="sm">(MDA_WEBHOOK_DESTINATIONS)</text>
  <text x="1288" y="744" class="sm">holds every ministry's</text>
  <text x="1288" y="760" class="sm">{ url, secret }, keyed by the</text>
  <text x="1288" y="776" class="sm">mda_contact ministry key.</text>
  <text x="1288" y="800" class="sm">Same row carries the email —</text>
  <text x="1288" y="816" class="sm">one MDA, both channels.</text>
  <text x="1288" y="840" class="sm">Add a form to a group by</text>
  <text x="1288" y="856" class="sm">pointing its form_config row</text>
  <text x="1288" y="872" class="sm">at the MDA — no new key.</text>

  <!-- ============ CONTAINER 3: PROVISIONING / WRITE PATH ============ -->
  <rect x="30" y="922" width="1460" height="316" rx="10" class="cont"/>
  <text x="48" y="947" class="h">3 · Provisioning — engineer/ops write path (edit secret → redeploy)</text>

  <rect x="48" y="978" width="150" height="60" rx="6" class="n"/>
  <text x="123" y="1012" text-anchor="middle" class="t">Engineer / Ops</text>

  <rect x="228" y="972" width="300" height="72" rx="6" class="c"/>
  <text x="378" y="994" text-anchor="middle" class="tb">put-secret-value</text>
  <text x="378" y="1010" text-anchor="middle" class="sm">MDA_WEBHOOK_DESTINATIONS</text>
  <text x="378" y="1026" text-anchor="middle" class="sm">set [ministry].url / .secret · per env</text>

  <rect x="558" y="972" width="240" height="72" rx="6" class="sec"/>
  <text x="678" y="994" text-anchor="middle" class="tb">AWS Secrets Manager</text>
  <text x="678" y="1012" text-anchor="middle" class="sm">KMS-encrypted · versioned</text>
  <text x="678" y="1028" text-anchor="middle" class="sm">· CloudTrail access audit</text>

  <rect x="828" y="972" width="230" height="72" rx="6" class="n"/>
  <text x="943" y="994" text-anchor="middle" class="tb">Redeploy / new ECS task</text>
  <text x="943" y="1012" text-anchor="middle" class="sm">task-def secrets → env var</text>
  <text x="943" y="1028" text-anchor="middle" class="sm">injected at container start</text>

  <rect x="1088" y="972" width="362" height="72" rx="6" class="a"/>
  <text x="1269" y="994" text-anchor="middle" class="tb">Boot: parse + validate JSON</text>
  <text x="1269" y="1012" text-anchor="middle" class="sm">OnApplicationBootstrap → in-memory map</text>
  <text x="1269" y="1028" text-anchor="middle" class="albl">feeds resolveWebhookDestination (§1)</text>

  <line x1="198" y1="1008" x2="226" y2="1008" class="ln" marker-end="url(#arrow)"/>
  <line x1="528" y1="1008" x2="556" y2="1008" class="ln" marker-end="url(#arrow)"/>
  <line x1="798" y1="1008" x2="826" y2="1008" class="ln" marker-end="url(#arrow)"/>
  <line x1="1058" y1="1008" x2="1086" y2="1008" class="ln" marker-end="url(#arrow)"/>

  <!-- JSON sample -->
  <rect x="48" y="1074" width="620" height="100" rx="6" class="sec"/>
  <text x="62" y="1094" class="sm">MDA_WEBHOOK_DESTINATIONS — one JSON secret, per environment</text>
  <text x="62" y="1114" class="mono">{</text>
  <text x="62" y="1130" class="mono">  "youth":     { "url": "https://cms.youth.gov.bb/…",     "secret": "•••" },</text>
  <text x="62" y="1146" class="mono">  "education": { "url": "https://cms.education.gov.bb/…", "secret": "•••" }</text>
  <text x="62" y="1162" class="mono">}</text>

  <text x="690" y="1092" class="sm">• Task-def secrets freeze the value for the task's life →</text>
  <text x="690" y="1108" class="sm">  rotating a destination needs a redeploy (accepted trade).</text>
  <text x="690" y="1128" class="sm">• Startup audit (Session C) WARNs + surfaces on /health when a</text>
  <text x="690" y="1144" class="sm">  mapped form's MDA has no JSON entry, or the JSON is malformed.</text>
  <text x="690" y="1164" class="sm">• Zero-deploy rotation (future): read the same secret via the</text>
  <text x="690" y="1180" class="sm">  aws-secrets runtime-fetch pattern (TTL cache) instead of env.</text>

  <!-- Deferred -->
  <rect x="1156" y="1090" width="320" height="72" rx="6" class="g"/>
  <text x="1316" y="1114" text-anchor="middle" class="tb">Deferred (future epic)</text>
  <text x="1316" y="1132" text-anchor="middle" class="sm">Admin UI · RBAC (who edits which MDA)</text>
  <text x="1316" y="1146" text-anchor="middle" class="sm">· change audit log — same storage path</text>
</svg>
