<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 1170" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#c0392b"/>
    </marker>
    <style>
      .a{fill:#e3f0fc;stroke:#2f6fb0;stroke-width:1.5}
      .b{fill:#e5f6e8;stroke:#3a9d4e;stroke-width:1.5}
      .c{fill:#fdf2dc;stroke:#d69a1e;stroke-width:1.5}
      .n{fill:#f4f4f7;stroke:#555;stroke-width:1.5}
      .x{fill:#efe6f8;stroke:#7a4fa0;stroke-width:1.5}
      .e{fill:#fdeaea;stroke:#c0392b;stroke-width:1.5}
      .g{fill:#eeeeee;stroke:#999;stroke-width:1.5;stroke-dasharray:4 3}
      .db{fill:#dbeaf7;stroke:#2f6fb0;stroke-width:1.5}
      .cont{fill:#ffffff;stroke:#c9c9d2;stroke-width:1.5}
      .t{font-size:12.5px;fill:#1e1e1e}
      .tb{font-size:12.5px;fill:#1e1e1e;font-weight:bold}
      .sm{font-size:10.5px;fill:#444}
      .h{font-size:15px;font-weight:bold;fill:#111}
      .ln{stroke:#444;stroke-width:1.6;fill:none}
      .lnr{stroke:#c0392b;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
      .albl{font-size:10.5px;fill:#555}
    </style>
  </defs>

  <!-- Title -->
  <text x="760" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#111">Per-MDA webhook destinations — implementation flow (#1920)</text>
  <text x="760" y="58" text-anchor="middle" font-size="13" fill="#555">DB-backed, encrypted (Approach C) · grouping via form_config → mda_contact · fail-loud → DLQ</text>

  <!-- Legend -->
  <g transform="translate(40,78)">
    <rect x="0" y="0" width="16" height="16" class="a"/><text x="22" y="12" class="sm">Session A — DB storage · SecretCrypto · resolution</text>
    <rect x="360" y="0" width="16" height="16" class="b"/><text x="382" y="12" class="sm">Session B — processor · recipe migration · lint · delete legacy</text>
    <rect x="760" y="0" width="16" height="16" class="c"/><text x="782" y="12" class="sm">Session C — seed command · startup audit · docs</text>
    <rect x="1090" y="0" width="16" height="16" class="x"/><text x="1112" y="12" class="sm">External CMS</text>
    <rect x="1240" y="0" width="16" height="16" class="e"/><text x="1262" y="12" class="sm">Fail-loud → DLQ</text>
    <rect x="1370" y="0" width="16" height="16" class="g"/><text x="1392" y="12" class="sm">Deferred</text>
  </g>

  <!-- ============ CONTAINER 1: RUNTIME DISPATCH ============ -->
  <rect x="30" y="120" width="1460" height="500" rx="10" class="cont"/>
  <text x="48" y="145" class="h">1 · Runtime dispatch (per submission)</text>

  <!-- Flow row A -->
  <rect x="48" y="162" width="150" height="52" rx="6" class="n"/>
  <text x="123" y="184" text-anchor="middle" class="t">Citizen submits</text>
  <text x="123" y="200" text-anchor="middle" class="t">form</text>

  <rect x="238" y="162" width="196" height="52" rx="6" class="n"/>
  <text x="336" y="182" text-anchor="middle" class="t">SQS · SubmissionProcessor</text>
  <text x="336" y="198" text-anchor="middle" class="t">Listener (per-entry #95)</text>

  <rect x="474" y="162" width="176" height="52" rx="6" class="b"/>
  <text x="562" y="184" text-anchor="middle" class="tb">WebhookProcessor</text>
  <text x="562" y="200" text-anchor="middle" class="t">.process(entry)</text>

  <!-- decision diamond -->
  <polygon points="770,150 890,188 770,226 650,188" class="b"/>
  <text x="770" y="182" text-anchor="middle" class="sm">config.mapping set</text>
  <text x="770" y="196" text-anchor="middle" class="sm">AND no endpoint/url?</text>

  <rect x="1000" y="162" width="220" height="52" rx="6" class="n"/>
  <text x="1110" y="182" text-anchor="middle" class="t">Generic webhook —</text>
  <text x="1110" y="198" text-anchor="middle" class="t">endpoint.env envelope (unchanged)</text>

  <line x1="198" y1="188" x2="236" y2="188" class="ln" marker-end="url(#arrow)"/>
  <line x1="434" y1="188" x2="472" y2="188" class="ln" marker-end="url(#arrow)"/>
  <!-- proc -> diamond -->
  <line x1="650" y1="188" x2="652" y2="188" class="ln" marker-end="url(#arrow)"/>
  <!-- diamond NO -> generic -->
  <line x1="890" y1="188" x2="998" y2="188" class="ln" marker-end="url(#arrow)"/>
  <text x="945" y="180" text-anchor="middle" class="albl">NO</text>

  <!-- Resolution row (Session A) -->
  <text x="770" y="248" text-anchor="middle" class="albl">YES ↓ mapped case-management webhook</text>
  <rect x="48" y="266" width="210" height="56" rx="6" class="a"/>
  <text x="153" y="288" text-anchor="middle" class="tb">resolveWebhook</text>
  <text x="153" y="304" text-anchor="middle" class="t">Destination(formId)</text>

  <rect x="292" y="266" width="196" height="56" rx="6" class="a"/>
  <text x="390" y="288" text-anchor="middle" class="t">form_config</text>
  <text x="390" y="304" text-anchor="middle" class="sm">formId → mdaContactId</text>

  <rect x="522" y="262" width="248" height="64" rx="6" class="a"/>
  <text x="646" y="284" text-anchor="middle" class="t">mda_contact row</text>
  <text x="646" y="300" text-anchor="middle" class="sm">webhook_url +</text>
  <text x="646" y="314" text-anchor="middle" class="sm">webhook_secret_encrypted</text>

  <rect x="804" y="262" width="252" height="64" rx="6" class="a"/>
  <text x="930" y="284" text-anchor="middle" class="tb">SecretCrypto.decrypt</text>
  <text x="930" y="300" text-anchor="middle" class="sm">AES-256-GCM</text>
  <text x="930" y="314" text-anchor="middle" class="sm">key ← MDA_SECRET_KEY (env)</text>

  <rect x="1088" y="266" width="150" height="56" rx="6" class="n"/>
  <text x="1163" y="290" text-anchor="middle" class="t">{ url, secret }</text>
  <text x="1163" y="306" text-anchor="middle" class="sm">resolved</text>

  <!-- YES elbow diamond -> resolve -->
  <path d="M770,226 L770,244 L153,244 L153,264" class="ln" marker-end="url(#arrow)"/>
  <line x1="258" y1="294" x2="290" y2="294" class="ln" marker-end="url(#arrow)"/>
  <line x1="488" y1="294" x2="520" y2="294" class="ln" marker-end="url(#arrow)"/>
  <line x1="770" y1="294" x2="802" y2="294" class="ln" marker-end="url(#arrow)"/>
  <line x1="1056" y1="294" x2="1086" y2="294" class="ln" marker-end="url(#arrow)"/>

  <!-- Delivery row (Session B) -->
  <rect x="48" y="360" width="232" height="58" rx="6" class="b"/>
  <text x="164" y="382" text-anchor="middle" class="tb">buildMappedCasePayload</text>
  <text x="164" y="398" text-anchor="middle" class="sm">code · programme_code · applicant · form_data</text>

  <rect x="314" y="360" width="190" height="58" rx="6" class="b"/>
  <text x="409" y="384" text-anchor="middle" class="t">assertSafeUrl(url)</text>
  <text x="409" y="400" text-anchor="middle" class="sm">SSRF guard</text>

  <rect x="538" y="360" width="232" height="58" rx="6" class="b"/>
  <text x="654" y="382" text-anchor="middle" class="t">POST url</text>
  <text x="654" y="398" text-anchor="middle" class="sm">header  X-API-Key: secret</text>

  <rect x="804" y="360" width="234" height="58" rx="6" class="x"/>
  <text x="921" y="384" text-anchor="middle" class="tb">MDA Case-Management</text>
  <text x="921" y="400" text-anchor="middle" class="t">System (CMS)</text>

  <!-- resolved -> build (elbow) -->
  <path d="M1163,322 L1163,340 L164,340 L164,358" class="ln" marker-end="url(#arrow)"/>
  <line x1="280" y1="389" x2="312" y2="389" class="ln" marker-end="url(#arrow)"/>
  <line x1="504" y1="389" x2="536" y2="389" class="ln" marker-end="url(#arrow)"/>
  <line x1="770" y1="389" x2="802" y2="389" class="ln" marker-end="url(#arrow)"/>

  <!-- Fail-loud lane -->
  <rect x="804" y="454" width="420" height="60" rx="6" class="e"/>
  <text x="1014" y="476" text-anchor="middle" class="tb">Fail loud — throw</text>
  <text x="1014" y="492" text-anchor="middle" class="sm">WebhookConfigError (resolve miss / misconfig)</text>
  <text x="1014" y="506" text-anchor="middle" class="sm">WebhookDeliveryError (non-2xx / timeout / network)</text>

  <rect x="1256" y="454" width="220" height="60" rx="6" class="e"/>
  <text x="1366" y="480" text-anchor="middle" class="tb">SQS retry → DLQ</text>
  <text x="1366" y="498" text-anchor="middle" class="sm">visible · redrivable</text>

  <line x1="1224" y1="484" x2="1254" y2="484" class="ln" marker-end="url(#arrow)"/>
  <!-- dotted error edges -->
  <path d="M930,326 L930,448" class="lnr" marker-end="url(#arrowRed)"/>
  <text x="965" y="392" class="albl" fill="#c0392b">resolve miss (null)</text>
  <path d="M654,418 L654,436 L900,436 L900,452" class="lnr" marker-end="url(#arrowRed)"/>
  <text x="700" y="432" class="albl" fill="#c0392b">delivery failure</text>
  <path d="M921,418 L921,436 L1000,436 L1000,452" class="lnr" marker-end="url(#arrowRed)"/>

  <text x="48" y="560" class="sm">Session B also: migrate every CMS recipe off WEBHOOK_URL_*/SECRET_* → mapped MDA mode (keep the mapping block); update webhook-recipe-guards lint;</text>
  <text x="48" y="578" class="sm">delete legacy apps/api/src/webhooks/ (youth listener/service/codes/extractor/module) + remove WebhooksModule. Recipe changes + deletion ship together.</text>
  <text x="48" y="600" class="sm">Golden-payload byte-compat test per migrated form: new mapped payload == legacy dispatch (deterministic code · programme_code · applicant · hoisted form_data).</text>

  <!-- ============ CONTAINER 2: GROUPING ============ -->
  <rect x="30" y="636" width="1460" height="266" rx="10" class="cont"/>
  <text x="48" y="661" class="h">2 · MDA grouping — many forms → one destination  (CMS destination == email MDA, 1:1)</text>

  <!-- Youth row -->
  <rect x="48" y="682" width="210" height="24" rx="4" class="b"/><text x="153" y="699" text-anchor="middle" class="sm">youth-opportunity-byac</text>
  <rect x="48" y="710" width="210" height="24" rx="4" class="b"/><text x="153" y="727" text-anchor="middle" class="sm">youth-opportunity-ydp</text>
  <rect x="48" y="738" width="210" height="24" rx="4" class="b"/><text x="153" y="755" text-anchor="middle" class="sm">… +16 more youth forms</text>

  <rect x="316" y="700" width="210" height="52" rx="6" class="db"/>
  <text x="421" y="722" text-anchor="middle" class="t">form_config rows</text>
  <text x="421" y="738" text-anchor="middle" class="sm">mdaContactId → Youth</text>

  <rect x="584" y="694" width="256" height="64" rx="6" class="a"/>
  <text x="712" y="715" text-anchor="middle" class="tb">mda_contact: Youth Opportunity</text>
  <text x="712" y="731" text-anchor="middle" class="sm">webhook_url + secret_encrypted</text>
  <text x="712" y="745" text-anchor="middle" class="sm">+ mda_email (email channel)</text>

  <rect x="898" y="700" width="200" height="52" rx="6" class="x"/>
  <text x="998" y="730" text-anchor="middle" class="t">CMS · Youth Opportunity</text>

  <path d="M258,694 L300,720" class="ln"/><path d="M258,722 L314,724" class="ln"/><path d="M258,750 L300,730" class="ln"/>
  <line x1="300" y1="726" x2="314" y2="726" class="ln" marker-end="url(#arrow)"/>
  <line x1="526" y1="726" x2="582" y2="726" class="ln" marker-end="url(#arrow)"/>
  <line x1="840" y1="726" x2="896" y2="726" class="ln" marker-end="url(#arrow)"/>

  <!-- MoE row -->
  <rect x="48" y="800" width="210" height="24" rx="4" class="b"/><text x="153" y="817" text-anchor="middle" class="sm">moe-form-a</text>
  <rect x="48" y="828" width="210" height="24" rx="4" class="b"/><text x="153" y="845" text-anchor="middle" class="sm">moe-form-b …</text>

  <rect x="316" y="810" width="210" height="52" rx="6" class="db"/>
  <text x="421" y="832" text-anchor="middle" class="t">form_config rows</text>
  <text x="421" y="848" text-anchor="middle" class="sm">mdaContactId → MoE</text>

  <rect x="584" y="804" width="256" height="64" rx="6" class="a"/>
  <text x="712" y="825" text-anchor="middle" class="tb">mda_contact: Ministry of Education</text>
  <text x="712" y="841" text-anchor="middle" class="sm">webhook_url + secret_encrypted</text>
  <text x="712" y="855" text-anchor="middle" class="sm">+ mda_email (email channel)</text>

  <rect x="898" y="810" width="200" height="52" rx="6" class="x"/>
  <text x="998" y="840" text-anchor="middle" class="t">CMS · Ministry of Education</text>

  <path d="M258,812 L300,832" class="ln"/><path d="M258,840 L300,836" class="ln"/>
  <line x1="300" y1="836" x2="314" y2="836" class="ln" marker-end="url(#arrow)"/>
  <line x1="526" y1="836" x2="582" y2="836" class="ln" marker-end="url(#arrow)"/>
  <line x1="840" y1="836" x2="896" y2="836" class="ln" marker-end="url(#arrow)"/>

  <text x="1130" y="712" class="sm">One mda_contact row serves</text>
  <text x="1130" y="728" class="sm">both channels: the CMS webhook</text>
  <text x="1130" y="744" class="sm">and the notification email.</text>
  <text x="1130" y="770" class="sm">Add a form to a group by pointing</text>
  <text x="1130" y="786" class="sm">its form_config row at the MDA —</text>
  <text x="1130" y="802" class="sm">no env var, no redeploy.</text>

  <!-- ============ CONTAINER 3: SEED / WRITE PATH ============ -->
  <rect x="30" y="918" width="1460" height="230" rx="10" class="cont"/>
  <text x="48" y="943" class="h">3 · Provisioning — engineer/ops write path (no UI, no redeploy)</text>

  <rect x="48" y="972" width="150" height="56" rx="6" class="n"/>
  <text x="123" y="1004" text-anchor="middle" class="t">Engineer / Ops</text>

  <rect x="238" y="968" width="288" height="64" rx="6" class="c"/>
  <text x="382" y="990" text-anchor="middle" class="tb">pnpm mda:set-webhook &lt;mda&gt;</text>
  <text x="382" y="1006" text-anchor="middle" class="sm">--url … · secret ← env / stdin (runtime)</text>
  <text x="382" y="1020" text-anchor="middle" class="sm">guarded · per-environment</text>

  <rect x="566" y="968" width="238" height="64" rx="6" class="c"/>
  <text x="685" y="994" text-anchor="middle" class="tb">SecretCrypto.encrypt</text>
  <text x="685" y="1012" text-anchor="middle" class="sm">AES-256-GCM · MDA_SECRET_KEY</text>

  <rect x="844" y="968" width="272" height="64" rx="6" class="db"/>
  <text x="980" y="990" text-anchor="middle" class="t">UPDATE mda_contact</text>
  <text x="980" y="1008" text-anchor="middle" class="sm">webhook_secret_encrypted =</text>
  <text x="980" y="1022" text-anchor="middle" class="sm">ciphertext</text>

  <line x1="198" y1="1000" x2="236" y2="1000" class="ln" marker-end="url(#arrow)"/>
  <line x1="526" y1="1000" x2="564" y2="1000" class="ln" marker-end="url(#arrow)"/>
  <line x1="804" y1="1000" x2="842" y2="1000" class="ln" marker-end="url(#arrow)"/>

  <text x="48" y="1058" class="sm">• Plaintext secret transits env at write time — never committed to git.   • DB write is live immediately (no redeploy).</text>
  <text x="48" y="1076" class="sm">• Startup audit (Session C) WARNs + surfaces on /health when a mapped form's MDA has no destination — gap shows at deploy, not first submission.</text>

  <!-- Deferred -->
  <rect x="1156" y="1052" width="320" height="72" rx="6" class="g"/>
  <text x="1316" y="1076" text-anchor="middle" class="tb">Deferred (future epic)</text>
  <text x="1316" y="1094" text-anchor="middle" class="sm">Admin UI · RBAC (who edits which MDA)</text>
  <text x="1316" y="1108" text-anchor="middle" class="sm">· change audit log — same storage path</text>
  <path d="M1116,1000 L1316,1000 L1316,1050" class="lnr" marker-end="url(#arrowRed)"/>
</svg>
