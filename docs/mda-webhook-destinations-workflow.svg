<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 940" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#c0392b"/>
    </marker>
    <style>
      .a{fill:#e3f0fc;stroke:#2f6fb0;stroke-width:1.5}
      .b{fill:#e5f6e8;stroke:#3a9d4e;stroke-width:1.5}
      .c{fill:#fdf2dc;stroke:#d69a1e;stroke-width:1.5}
      .n{fill:#f4f4f7;stroke:#555;stroke-width:1.5}
      .x{fill:#efe6f8;stroke:#7a4fa0;stroke-width:1.5}
      .e{fill:#fdeaea;stroke:#c0392b;stroke-width:1.5}
      .g{fill:#eeeeee;stroke:#999;stroke-width:1.5;stroke-dasharray:4 3}
      .cont{fill:#ffffff;stroke:#c9c9d2;stroke-width:1.5}
      .t{font-size:12.5px;fill:#1e1e1e}
      .tb{font-size:12.5px;fill:#1e1e1e;font-weight:bold}
      .sm{font-size:10.5px;fill:#444}
      .h{font-size:15px;font-weight:bold;fill:#111}
      .ln{stroke:#444;stroke-width:1.6;fill:none}
      .lnr{stroke:#c0392b;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
      .albl{font-size:10.5px;fill:#555}
    </style>
  </defs>

  <text x="760" y="32" text-anchor="middle" font-size="23" font-weight="bold" fill="#111">Per-MDA webhook destinations — interim flow (#1920)</text>
  <text x="760" y="56" text-anchor="middle" font-size="13" fill="#555">One JSON env var (Secrets Manager → env at deploy) · grouping via recipe mdaKey · fail-loud → DLQ · DB approach = deferred Phase 2</text>

  <!-- Legend -->
  <g transform="translate(40,74)">
    <rect x="0" y="0" width="15" height="15" class="c"/><text x="20" y="12" class="sm">Interim config (WEBHOOK_MDA_CONFIG)</text>
    <rect x="290" y="0" width="15" height="15" class="a"/><text x="310" y="12" class="sm">Boot-loaded map</text>
    <rect x="470" y="0" width="15" height="15" class="b"/><text x="490" y="12" class="sm">Processor · recipe mapping</text>
    <rect x="720" y="0" width="15" height="15" class="x"/><text x="740" y="12" class="sm">External CMS</text>
    <rect x="870" y="0" width="15" height="15" class="e"/><text x="890" y="12" class="sm">Fail-loud → DLQ</text>
    <rect x="1020" y="0" width="15" height="15" class="g"/><text x="1040" y="12" class="sm">Deferred (Phase 2 · DB)</text>
  </g>

  <!-- ===== PANEL 1: BOOT / CONFIG LOAD ===== -->
  <rect x="30" y="104" width="1460" height="205" rx="10" class="cont"/>
  <text x="48" y="130" class="h">1 · Boot — load config once (no runtime AWS)</text>

  <rect x="50" y="172" width="180" height="52" rx="6" class="n"/>
  <text x="140" y="196" text-anchor="middle" class="t">AWS Secrets Manager</text>
  <text x="140" y="212" text-anchor="middle" class="sm">(deploy time)</text>

  <rect x="262" y="172" width="238" height="52" rx="6" class="c"/>
  <text x="381" y="196" text-anchor="middle" class="tb">env: WEBHOOK_MDA_CONFIG</text>
  <text x="381" y="212" text-anchor="middle" class="sm">JSON — all MDA destinations</text>

  <rect x="540" y="172" width="200" height="52" rx="6" class="c"/>
  <text x="640" y="196" text-anchor="middle" class="t">parse + validate</text>
  <text x="640" y="212" text-anchor="middle" class="sm">typed (parseFormConfigBlob pattern)</text>

  <rect x="770" y="168" width="260" height="60" rx="6" class="a"/>
  <text x="900" y="190" text-anchor="middle" class="tb">in-memory map</text>
  <text x="900" y="206" text-anchor="middle" class="sm">mdaKey → { url, secret }</text>
  <text x="900" y="220" text-anchor="middle" class="sm">held for process lifetime</text>

  <line x1="230" y1="198" x2="260" y2="198" class="ln" marker-end="url(#arrow)"/>
  <line x1="500" y1="198" x2="538" y2="198" class="ln" marker-end="url(#arrow)"/>
  <line x1="740" y1="198" x2="768" y2="198" class="ln" marker-end="url(#arrow)"/>

  <rect x="540" y="256" width="360" height="40" rx="6" class="c"/>
  <text x="720" y="281" text-anchor="middle" class="sm">malformed → WARN + surface on /health · does NOT hard-fail prod boot</text>
  <path d="M640,224 L640,254" class="lnr" marker-end="url(#arrowRed)"/>

  <text x="1052" y="188" class="sm">Loaded once at boot.</text>
  <text x="1052" y="204" class="sm">Secret arrives via the existing</text>
  <text x="1052" y="220" class="sm">Secrets-Manager → env path.</text>
  <text x="1052" y="240" class="sm">Changing a value = redeploy</text>
  <text x="1052" y="256" class="sm">(no-redeploy rotation = Phase 2).</text>

  <!-- ===== PANEL 2: RUNTIME DISPATCH ===== -->
  <rect x="30" y="325" width="1460" height="358" rx="10" class="cont"/>
  <text x="48" y="351" class="h">2 · Runtime dispatch (per submission)</text>

  <rect x="50" y="372" width="150" height="52" rx="6" class="n"/>
  <text x="125" y="404" text-anchor="middle" class="t">Citizen submits</text>

  <rect x="222" y="372" width="196" height="52" rx="6" class="n"/>
  <text x="320" y="392" text-anchor="middle" class="t">SQS · SubmissionProcessor</text>
  <text x="320" y="408" text-anchor="middle" class="t">Listener</text>

  <rect x="440" y="372" width="182" height="52" rx="6" class="b"/>
  <text x="531" y="404" text-anchor="middle" class="tb">WebhookProcessor.process</text>

  <polygon points="700,368 772,400 700,432 628,400" class="b"/>
  <text x="700" y="404" text-anchor="middle" class="sm">config.mapping set?</text>

  <rect x="820" y="372" width="232" height="52" rx="6" class="n"/>
  <text x="936" y="392" text-anchor="middle" class="t">Generic webhook —</text>
  <text x="936" y="408" text-anchor="middle" class="sm">endpoint.env (unchanged)</text>

  <line x1="200" y1="398" x2="220" y2="398" class="ln" marker-end="url(#arrow)"/>
  <line x1="418" y1="398" x2="438" y2="398" class="ln" marker-end="url(#arrow)"/>
  <line x1="622" y1="398" x2="626" y2="400" class="ln" marker-end="url(#arrow)"/>
  <line x1="772" y1="400" x2="818" y2="400" class="ln" marker-end="url(#arrow)"/>
  <text x="795" y="392" text-anchor="middle" class="albl">NO</text>

  <!-- Resolution row -->
  <text x="700" y="452" text-anchor="middle" class="albl">YES ↓ mapped case-management webhook</text>
  <rect x="50" y="462" width="212" height="56" rx="6" class="c"/>
  <text x="156" y="484" text-anchor="middle" class="tb">resolve config.mdaKey</text>
  <text x="156" y="500" text-anchor="middle" class="sm">lookup in boot map</text>

  <rect x="292" y="462" width="128" height="56" rx="6" class="n"/>
  <text x="356" y="486" text-anchor="middle" class="t">{ url, secret }</text>
  <text x="356" y="502" text-anchor="middle" class="sm">resolved</text>

  <rect x="450" y="462" width="230" height="56" rx="6" class="b"/>
  <text x="565" y="484" text-anchor="middle" class="tb">buildMappedCasePayload</text>
  <text x="565" y="500" text-anchor="middle" class="sm">code · programme_code · applicant · form_data</text>

  <rect x="710" y="462" width="180" height="56" rx="6" class="b"/>
  <text x="800" y="486" text-anchor="middle" class="t">assertSafeUrl(url)</text>
  <text x="800" y="502" text-anchor="middle" class="sm">SSRF guard</text>

  <path d="M700,432 L700,450 L156,450 L156,460" class="ln" marker-end="url(#arrow)"/>
  <line x1="262" y1="490" x2="290" y2="490" class="ln" marker-end="url(#arrow)"/>
  <line x1="420" y1="490" x2="448" y2="490" class="ln" marker-end="url(#arrow)"/>
  <line x1="680" y1="490" x2="708" y2="490" class="ln" marker-end="url(#arrow)"/>

  <!-- Delivery row -->
  <rect x="450" y="548" width="230" height="52" rx="6" class="b"/>
  <text x="565" y="570" text-anchor="middle" class="t">POST url</text>
  <text x="565" y="586" text-anchor="middle" class="sm">header  X-API-Key: secret</text>

  <rect x="710" y="548" width="232" height="52" rx="6" class="x"/>
  <text x="826" y="570" text-anchor="middle" class="tb">MDA Case-Management</text>
  <text x="826" y="586" text-anchor="middle" class="t">System (CMS)</text>

  <path d="M800,518 L800,533 L565,533 L565,546" class="ln" marker-end="url(#arrow)"/>
  <line x1="680" y1="574" x2="708" y2="574" class="ln" marker-end="url(#arrow)"/>

  <!-- Fail-loud lane -->
  <rect x="50" y="620" width="880" height="48" rx="6" class="e"/>
  <text x="490" y="640" text-anchor="middle" class="tb">Fail loud — throw</text>
  <text x="490" y="656" text-anchor="middle" class="sm">WebhookConfigError (unknown mdaKey / blank url|secret)  ·  WebhookDeliveryError (non-2xx / timeout / network)</text>

  <rect x="960" y="620" width="460" height="48" rx="6" class="e"/>
  <text x="1190" y="640" text-anchor="middle" class="tb">SQS retry → DLQ</text>
  <text x="1190" y="656" text-anchor="middle" class="sm">visible · redrivable</text>

  <path d="M156,518 L156,618" class="lnr" marker-end="url(#arrowRed)"/>
  <text x="186" y="560" class="albl" fill="#c0392b">resolve miss</text>
  <path d="M565,600 L565,618" class="lnr" marker-end="url(#arrowRed)"/>
  <text x="595" y="614" class="albl" fill="#c0392b">delivery fail</text>
  <line x1="930" y1="644" x2="958" y2="644" class="ln" marker-end="url(#arrow)"/>

  <!-- ===== PANEL 3: GROUPING + FUTURE ===== -->
  <rect x="30" y="699" width="1460" height="210" rx="10" class="cont"/>
  <text x="48" y="725" class="h">3 · Grouping — recipe declares the MDA (many forms → one destination)</text>

  <rect x="50" y="744" width="252" height="52" rx="6" class="b"/>
  <text x="176" y="766" text-anchor="middle" class="tb">Youth-Opportunity forms</text>
  <text x="176" y="782" text-anchor="middle" class="sm">recipe mdaKey: "youth-opportunity"</text>

  <rect x="352" y="744" width="272" height="52" rx="6" class="c"/>
  <text x="488" y="766" text-anchor="middle" class="t">WEBHOOK_MDA_CONFIG</text>
  <text x="488" y="782" text-anchor="middle" class="sm">["youth-opportunity"] = {url, secret}</text>

  <rect x="674" y="746" width="210" height="48" rx="6" class="x"/>
  <text x="779" y="775" text-anchor="middle" class="t">CMS · Youth Opportunity</text>

  <rect x="50" y="812" width="252" height="52" rx="6" class="b"/>
  <text x="176" y="834" text-anchor="middle" class="tb">Ministry-of-Education forms</text>
  <text x="176" y="850" text-anchor="middle" class="sm">recipe mdaKey: "education"</text>

  <rect x="352" y="812" width="272" height="52" rx="6" class="c"/>
  <text x="488" y="834" text-anchor="middle" class="t">WEBHOOK_MDA_CONFIG</text>
  <text x="488" y="850" text-anchor="middle" class="sm">["education"] = {url, secret}</text>

  <rect x="674" y="814" width="210" height="48" rx="6" class="x"/>
  <text x="779" y="843" text-anchor="middle" class="t">CMS · Ministry of Education</text>

  <line x1="302" y1="770" x2="350" y2="770" class="ln" marker-end="url(#arrow)"/>
  <line x1="624" y1="770" x2="672" y2="770" class="ln" marker-end="url(#arrow)"/>
  <line x1="302" y1="838" x2="350" y2="838" class="ln" marker-end="url(#arrow)"/>
  <line x1="624" y1="838" x2="672" y2="838" class="ln" marker-end="url(#arrow)"/>

  <rect x="912" y="744" width="558" height="120" rx="8" class="g"/>
  <text x="1191" y="768" text-anchor="middle" class="tb">Phase 2 — deferred (database-backed)</text>
  <text x="932" y="790" class="sm">When MDAs grow or destinations must rotate without a redeploy:</text>
  <text x="932" y="808" class="sm">• webhook_url + AES-256-GCM secret on mda_contact</text>
  <text x="932" y="824" class="sm">• resolve via form_config → mda_contact (reunifies email + webhook grouping)</text>
  <text x="932" y="840" class="sm">• uncached read → rotate with no redeploy · then admin UI (RBAC + audit)</text>
  <text x="932" y="856" class="sm">Not built now — documented next step.</text>
</svg>
