# Local-dev stack for the gov-bb monorepo. One command brings up postgres,
# api, landing, forms, and chat; the api waits for postgres to be healthy
# before starting, runs migrations on boot, and optionally seeds an example
# FormDefinition (controlled by SEED_ON_BOOT in .env).
#
# Bring it up:    docker compose up
# Tear it down:   docker compose down
# Reset the DB:   docker compose down -v
#
# Configure env in .env (copy from .env.example). Compose auto-loads .env
# from the project root for ${VAR} interpolation in this file.
#
# Hot reload: every app service bind-mounts its source and the shared
# ./packages tree from the host, so a host edit triggers a rebuild inside
# the container. The api uses the `dev` target in apps/api/Dockerfile
# (nx dev api → tsc --watch + node restart, the same watcher `pnpm dev:api`
# runs on the host); landing/forms/chat/form_builder run vite dev directly.
# Each service uses an anonymous volume at its node_modules path so the
# host's (possibly absent or mismatched-arch) node_modules can't shadow
# the image's.
#
# Postgres uses the pgvector/pgvector:pg16 image (a drop-in superset of
# postgres:16) so the `vector` extension is available for the chat app's
# RAG pipeline. scripts/postgres-init.sql creates the `chat` database and
# enables the extension; the api's `modular_forms` database is created by
# POSTGRES_DB and uses no extensions.

name: gov-bb

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-modular_forms}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-modular_forms}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      # The nx dev watcher chain (tsc --watch → @nx/js:node) doesn't see file
      # events through docker-desktop's macOS bind-mount layer, so source
      # edits never trigger a recompile. Forcing polling fixes it; Vite has
      # its own FS-event path that works without this knob, so the other
      # apps don't need it.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      TSC_WATCHFILE: dynamicPriorityPolling
      API_PORT: ${API_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:4200}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-modular_forms}
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: ${DB_LOGGING:-false}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
      EZPAY_BASE_URL: ${EZPAY_BASE_URL:-https://test.ezpay.gov.bb}
      EZPAY_DEPARTMENT_API_KEYS: ${EZPAY_DEPARTMENT_API_KEYS:-{}}
      EZPAY_WEBHOOK_VERIFY_SIGNATURE: ${EZPAY_WEBHOOK_VERIFY_SIGNATURE:-true}
      EZPAY_WEBHOOK_SECRET: ${EZPAY_WEBHOOK_SECRET:-change-me-local-webhook-secret}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json
      - ./apps/api/nest-cli.json:/app/apps/api/nest-cli.json
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./apps/landing/src:/app/apps/landing/src
      - ./apps/landing/public:/app/apps/landing/public
      - ./packages:/app/packages
      - /app/apps/landing/node_modules
    # Landing has no runtime dependency on api or postgres — it serves
    # static-ish content. Start in parallel.

  forms:
    build:
      context: .
      dockerfile: apps/forms/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Browser-side fetches go to the host-mapped api port.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      # Container listens on 3000; host gets 4200 to match the historical
      # convention in the repo README.
      - "4200:3000"
    volumes:
      - ./apps/forms/src:/app/apps/forms/src
      - ./apps/forms/public:/app/apps/forms/public
      - ./apps/forms/contracts:/app/apps/forms/contracts
      - ./packages:/app/packages
      - /app/apps/forms/node_modules

  chat:
    build:
      context: .
      dockerfile: apps/chat/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Postgres `chat` database is created by scripts/postgres-init.sql with
      # the pgvector extension already enabled.
      DATABASE_URL: postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/chat
      # The chat server calls its own /api/retrieve over HTTP — keep that loop
      # inside the container.
      RAG_URL: http://localhost:3000/api
      # Anthropic (required for the LLM turn).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5}
      # AWS Bedrock (required for Titan embeddings, used by retrieve + ingest).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-ca-central-1}
      BEDROCK_REGION: ${BEDROCK_REGION:-}
      BEDROCK_EMBED_MODEL: ${BEDROCK_EMBED_MODEL:-amazon.titan-embed-text-v2:0}
    ports:
      - "${CHAT_PORT:-3002}:3000"
    volumes:
      - ./apps/chat/src:/app/apps/chat/src
      - ./apps/chat/public:/app/apps/chat/public
      - ./packages:/app/packages
      - /app/apps/chat/node_modules
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  form_builder:
    build:
      context: .
      dockerfile: apps/form_builder/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # form_builder talks directly to Postgres via @govtech-bb/database
      # (the same modular_forms DB the api owns). Schema is created/migrated
      # by the api on its boot — form_builder is a reader/writer, not a
      # migrator.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-modular_forms}
      # Session signing secret — required, app throws on missing. The default
      # is dev-only padding; override in .env for anything real.
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-do-not-use-in-production-padding-padding=}
      # GitHub OAuth wraps the /builder routes. Empty defaults let the app boot
      # and serve the redirect-to-login flow without crashing; the actual login
      # round-trip needs real creds.
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-http://localhost:3003}
      # Org owning the repo + hosting the access team, and the team slug (URL form)
      # whose members may log in. Like the OAuth creds above, the empty TEAM_SLUG
      # default lets the app boot; the login round-trip throws until it's set.
      GITHUB_ORG: ${GITHUB_ORG:-govtech-bb}
      GITHUB_TEAM_SLUG: ${GITHUB_TEAM_SLUG:-}
      # AI-assisted authoring (form_builder uses AI_PROVIDER/AI_MODEL, not the
      # chat app's LLM_MODEL).
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-20250514}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-ca-central-1}
    ports:
      - "${FORM_BUILDER_PORT:-3003}:3000"
    volumes:
      - ./apps/form_builder/app:/app/apps/form_builder/app
      - ./packages:/app/packages
      - /app/apps/form_builder/node_modules

volumes:
  postgres-data:
