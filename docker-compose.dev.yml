# Overlay for hot-reload local dev (landing + web).
#
# Use:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# What this adds:
#   - Source bind-mounts on apps/landing and apps/web so editing files on
#     the host triggers a Vite rebuild inside the container.
#   - Anonymous volumes on each app's node_modules so the host's local
#     node_modules (which may be absent or mismatched-arch) can't shadow
#     the deps installed in the image.
#
# What this intentionally doesn't do:
#   - The api is NOT overlaid. NestJS dev requires @nestjs/cli (the `nest`
#     binary), which isn't a declared dependency in this monorepo — devs
#     either have it globally or run via the built artifact. If you're
#     iterating on the api, the lowest-friction loop is:
#         docker compose up postgres -d         # just postgres in a container
#         pnpm dev:api                          # nest start --watch on host
#     The compose'd api is still useful as a known-good baseline.

services:
  landing:
    volumes:
      - ./apps/landing/src:/app/apps/landing/src
      - ./apps/landing/public:/app/apps/landing/public
      - /app/apps/landing/node_modules

  web:
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/contracts:/app/apps/web/contracts
      - ./packages:/app/packages
      - /app/apps/web/node_modules

  # The api service is not overlaid for hot-reload (see header), but when it
  # runs in compose, bind-mount the host's recipes/ tree so the RecipeFileLoader
  # picks up edits without a rebuild. Harmless when api is not running.
  api:
    volumes:
      - ./recipes:/app/recipes
